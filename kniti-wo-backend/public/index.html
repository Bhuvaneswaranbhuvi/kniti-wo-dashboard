<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knit-I Work Orders — Dashboard</title>
<style>
  :root{
    --navy:#16232E; --steel:#3D6B8C; --steel-light:#DCE7ED; --amber:#D68A2D;
    --paper:#F6F5F1; --card:#FFFFFF; --line:#D9DCD9; --ink:#1B2229; --ink-soft:#5B6570;
    --mono:'SFMono-Regular',Consolas,monospace; --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);}
  header{background:var(--navy);color:#fff;padding:18px 24px;position:relative;}
  header h1{margin:0;font-size:18px;}
  header .sub{color:#B9C6CF;font-size:12.5px;margin-top:3px;}
  .wrap{max-width:1100px;margin:0 auto;padding:20px;}
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
  .filters input,.filters select{padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px;background:#fff;}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;border:1px solid var(--line);}
  th,td{padding:10px 12px;text-align:left;font-size:13px;border-bottom:1px solid var(--line);}
  th{background:var(--steel-light);color:var(--navy);text-transform:uppercase;font-size:10.5px;letter-spacing:.04em;}
  tr:last-child td{border-bottom:none;}
  tr.row{cursor:pointer;}
  tr.row:hover{background:#FAFBFC;}
  .chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:700;text-transform:uppercase;}
  .chip.service{background:#E4EEF3;color:var(--steel);}
  .chip.installation{background:#FCEED4;color:#8A5A17;}
  .stars{color:var(--amber);}
  .empty{padding:40px;text-align:center;color:var(--ink-soft);}
  .tabs{display:flex;gap:6px;margin-bottom:16px;}
  .tabBtn{padding:9px 16px;border:1px solid var(--line);background:#fff;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink-soft);}
  .tabBtn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
  .card-panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:16px;}
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;}
  .form-grid input,.form-grid select{padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px;}
  .status-chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:700;text-transform:uppercase;}
  .status-chip.scheduled{background:#E4EEF3;color:var(--steel);}
  .status-chip.in_progress{background:#FCEED4;color:#8A5A17;}
  .status-chip.completed{background:#DCEFE1;color:#2C6B3F;}
  .status-chip.cancelled{background:#F3DCDC;color:#8A2C2C;}
  #detailOverlay{position:fixed;inset:0;background:rgba(10,14,18,.6);display:none;align-items:flex-start;justify-content:center;overflow:auto;padding:30px 16px;z-index:100;}
  .modal-overlay{position:fixed;inset:0;background:rgba(10,14,18,.6);display:none;align-items:center;justify-content:center;overflow:auto;padding:30px 16px;z-index:150;}
  .modal-overlay.show{display:flex;}
  #detailOverlay.show{display:flex;}
  .detail-box{background:#fff;border-radius:10px;max-width:800px;width:100%;padding:26px;position:relative;}
  .detail-box h2{margin-top:0;}
  .detail-box .closeBtn{position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink-soft);}
  .section{margin-top:20px;}
  .section h3{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--steel);border-bottom:1px solid var(--line);padding-bottom:5px;}
  .kv{display:grid;grid-template-columns:200px 1fr;gap:6px 12px;font-size:13px;margin-top:8px;}
  .kv div:nth-child(odd){color:var(--ink-soft);}
  .imgs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px;}
  .imgs img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:6px;border:1px solid var(--line);cursor:zoom-in;}
  .machine-block{border:1px solid var(--line);border-radius:8px;padding:14px;margin-top:10px;}
  .btn{padding:9px 16px;border:none;border-radius:7px;background:var(--navy);color:#fff;font-size:13px;cursor:pointer;font-weight:600;}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200;cursor:zoom-out;}
  .lightbox img{max-width:92%;max-height:92%;}
  @media print{ header,.filters,.closeBtn,.no-print{display:none!important;} #detailOverlay{position:static;background:none;padding:0;} .detail-box{box-shadow:none;} }
</style>
</head>
<body>
<header>
  <h1>Knit-I Work Orders</h1>
  <div class="sub">All submissions and scheduled work across engineers</div>
  <button class="tabBtn no-print" id="openConfig" style="position:absolute;top:18px;right:24px;background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.3);">⚙️ Connection</button>
</header>
<div id="configOverlay" class="modal-overlay">
  <div class="detail-box" style="max-width:420px;">
    <h2 style="margin-top:0;">Connect to Supabase</h2>
    <p class="sub" style="margin-bottom:14px;">Paste your project's URL and anon/public API key (Project Settings → API in Supabase).</p>
    <label style="font-size:12px;font-weight:600;display:block;margin-bottom:4px;">Supabase URL</label>
    <input type="text" id="cfgUrl" placeholder="https://xxxx.supabase.co" style="width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;margin-bottom:10px;">
    <label style="font-size:12px;font-weight:600;display:block;margin-bottom:4px;">Anon Key</label>
    <input type="text" id="cfgKey" placeholder="Paste the anon/public key" style="width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;margin-bottom:14px;">
    <button class="btn" id="configSave">Save & Connect</button>
  </div>
</div>
<div class="wrap">
  <div class="tabs no-print">
    <button class="tabBtn active" id="tabOrders">Submitted Orders</button>
    <button class="tabBtn" id="tabAssignments">Assignments (Scheduling)</button>
  </div>

  <div id="ordersView">
    <div class="filters">
      <input type="text" id="fEngineer" placeholder="Engineer">
      <input type="text" id="fCustomer" placeholder="Customer / Mill">
      <select id="fType">
        <option value="">All Types</option>
        <option value="service">Service / Repair</option>
        <option value="installation">Installation</option>
      </select>
      <button class="btn" id="applyFilters">Filter</button>
      <button class="btn" style="background:transparent;color:var(--steel);border:1px solid var(--steel-light);" id="clearFilters">Clear</button>
    </div>
    <div id="tableWrap"></div>
  </div>

  <div id="assignmentsView" style="display:none;">
    <div class="card-panel">
      <h3 style="margin-top:0;">Schedule a New Order</h3>
      <div class="form-grid">
        <select id="aType">
          <option value="service">Service / Repair</option>
          <option value="installation">Installation</option>
        </select>
        <input type="text" id="aEngineer" placeholder="Engineer name">
        <input type="text" id="aCustomer" placeholder="Customer / Mill">
        <input type="text" id="aLocation" placeholder="Location">
        <input type="date" id="aDate">
      </div>
      <textarea id="aNotes" placeholder="Notes for the engineer (what to expect, machine count, access instructions...)" rows="2" style="width:100%;margin-top:10px;padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:13px;"></textarea>
      <button class="btn" id="createAssignment" style="margin-top:10px;">+ Schedule Order</button>
      <span id="assignStatus" style="margin-left:10px;font-size:12.5px;color:var(--ink-soft);"></span>
    </div>

    <div class="filters" style="margin-top:16px;">
      <input type="text" id="afEngineer" placeholder="Engineer">
      <select id="afStatus">
        <option value="">All Statuses</option>
        <option value="scheduled">Scheduled</option>
        <option value="in_progress">In Progress</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <button class="btn" id="applyAssignFilters">Filter</button>
    </div>
    <div id="assignTableWrap"></div>
  </div>
</div>

<div id="detailOverlay">
  <div class="detail-box">
    <button class="closeBtn no-print" id="closeDetail">✕</button>
    <div id="detailContent">Loading…</div>
    <div class="no-print" style="margin-top:20px;"><button class="btn" onclick="window.print()">🖨️ Print</button></div>
  </div>
</div>

<script>
let SUPA_URL = localStorage.getItem('supa_url') || '';
let SUPA_KEY = localStorage.getItem('supa_key') || '';

function supaHeaders(extra){
  return Object.assign({ 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }, extra || {});
}

function ensureConfigured(){
  if(SUPA_URL && SUPA_KEY) return true;
  document.getElementById('configOverlay').classList.add('show');
  return false;
}

document.getElementById('configSave').onclick = ()=>{
  SUPA_URL = document.getElementById('cfgUrl').value.trim().replace(/\/+$/,'');
  SUPA_KEY = document.getElementById('cfgKey').value.trim();
  localStorage.setItem('supa_url', SUPA_URL);
  localStorage.setItem('supa_key', SUPA_KEY);
  document.getElementById('configOverlay').classList.remove('show');
  loadTable();
};
document.getElementById('cfgUrl').value = SUPA_URL;
document.getElementById('cfgKey').value = SUPA_KEY;

async function fetchOrders(params){
  if(!ensureConfigured()) return [];
  const qs = new URLSearchParams(params).toString();
  const res = await fetch(`${SUPA_URL}/rest/v1/orders?select=id,order_type,wo_number,customer,location,engineer,machine_count,csat_rating,created_at&order=created_at.desc${qs?'&'+qs:''}`, { headers: supaHeaders() });
  return res.json();
}
async function fetchOrder(id){
  const res = await fetch(`${SUPA_URL}/rest/v1/orders?id=eq.${id}&select=data`, { headers: supaHeaders() });
  const rows = await res.json();
  return rows[0] ? rows[0].data : {};
}

function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(iso){ try{ return new Date(iso).toLocaleString(undefined,{month:'short',day:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }catch(e){ return iso; } }
function stars(n){ return '★'.repeat(n||0) + '☆'.repeat(5-(n||0)); }

function renderTable(rows){
  const wrap = document.getElementById('tableWrap');
  if(!rows.length){ wrap.innerHTML = '<div class="empty">No orders submitted yet.</div>'; return; }
  wrap.innerHTML = `
  <table>
    <thead><tr>
      <th>WO #</th><th>Type</th><th>Customer</th><th>Location</th><th>Engineer</th><th>Machines</th><th>CSAT</th><th>Submitted</th>
    </tr></thead>
    <tbody>
      ${rows.map(r=>`
        <tr class="row" data-id="${r.id}">
          <td>${esc(r.wo_number)||'—'}</td>
          <td><span class="chip ${r.order_type}">${r.order_type==='installation'?'Install':'Service'}</span></td>
          <td>${esc(r.customer)||'—'}</td>
          <td>${esc(r.location)||'—'}</td>
          <td>${esc(r.engineer)||'—'}</td>
          <td>${r.machine_count||0}</td>
          <td class="stars">${stars(r.csat_rating)}</td>
          <td>${fmtDate(r.created_at)}</td>
        </tr>`).join('')}
    </tbody>
  </table>`;
  wrap.querySelectorAll('tr.row').forEach(tr=>{
    tr.onclick = ()=>openDetail(tr.getAttribute('data-id'));
  });
}

async function loadTable(){
  const params = {};
  const eng = document.getElementById('fEngineer').value.trim();
  const cust = document.getElementById('fCustomer').value.trim();
  const type = document.getElementById('fType').value;
  if(eng) params.engineer = `ilike.*${eng}*`;
  if(cust) params.customer = `ilike.*${cust}*`;
  if(type) params.order_type = `eq.${type}`;
  const rows = await fetchOrders(params);
  renderTable(rows);
}

function imageGrid(urls){
  if(!urls || !urls.length) return '<p style="color:var(--ink-soft);font-style:italic;font-size:13px;">No photos</p>';
  return `<div class="imgs">${urls.map(u=>`<img src="${u}" data-lightbox="1">`).join('')}</div>`;
}

function renderMachine(m, i){
  const catLabels = {
    before:'Before', after:'After', cameraPosition:'Camera Position', cameraIsolationClamp:'Camera Isolation Clamp',
    cabinetPosition:'Cabinet Position', cabinetSerialImg:'Cabinet Serial No.', sensorConnection:'Sensor Connection',
    relayConnection:'Relay Connection', powerSupplyMcb:'Power Supply (MCB)', cam1Light:'Camera 1 Light', cam2Light:'Camera 2 Light'
  };
  const imgs = m.images || {};
  const imgBlocks = Object.keys(catLabels).filter(k=>imgs[k] && imgs[k].length).map(k=>`
    <p style="font-size:11px;text-transform:uppercase;color:var(--ink-soft);margin:10px 0 2px;">${catLabels[k]}</p>
    ${imageGrid(imgs[k])}`).join('');
  const defects = (m.defects||[]).map(d=>`
    <tr><td>${esc(d.label)}</td><td>${d.captured==='yes'?'Yes':'No'}</td><td>${esc(d.rollNo)||'—'}</td><td>${esc(d.rotationNo)||'—'}</td><td>${esc(d.comment)||'—'}</td></tr>`).join('');
  return `
  <div class="machine-block">
    <h3 style="border:none;padding:0;margin:0 0 8px;">Machine ${i+1}${m.kmName?': '+esc(m.kmName):''}</h3>
    <div class="kv">
      <div>Type of Machine</div><div>${esc(m.machineType)||'—'}</div>
      <div>Cabinet Serial No.</div><div>${esc(m.cabinetSerial)||'—'}</div>
      <div>Tailscale IP</div><div>${esc(m.tailscaleIp)||'—'}</div>
      <div>Cabinet Type</div><div>${esc(m.cabinetType)||'—'}</div>
      <div>No. of Cameras</div><div>${esc(m.numCams)||'—'}</div>
      <div>KM Brand / Model</div><div>${esc(m.kmBrand)||'—'} / ${esc(m.kmModel)||'—'}</div>
      <div>KM Serial No.</div><div>${esc(m.kmSerial)||'—'}</div>
      <div>Gauge / Diameter</div><div>${esc(m.kmGauge)||'—'} / ${esc(m.kmDiameter)||'—'}</div>
      <div>Program Details</div><div>${esc(m.kmProgram)||'—'}</div>
    </div>
    ${imgBlocks}
    <table style="margin-top:10px;width:100%;font-size:12.5px;">
      <thead><tr><th>Defect</th><th>Captured</th><th>Roll</th><th>Rotation</th><th>Comments</th></tr></thead>
      <tbody>${defects}</tbody>
    </table>
  </div>`;
}

function renderSignOff(d){
  const s = d.signOff || {};
  const eng = s.engineer || {}, cust = s.customer || {};
  return `
  <div class="section">
    <h3>Sign-Off</h3>
    <div style="display:flex;gap:20px;margin-top:8px;">
      <div style="flex:1;text-align:center;">
        ${eng.sig ? `<img src="${eng.sig}" style="max-width:100%;height:60px;object-fit:contain;border-bottom:1px solid var(--ink);">` : '<div style="height:60px;"></div>'}
        <div style="font-weight:700;font-size:13px;margin-top:4px;">${esc(eng.name)||'—'}</div>
        <div style="font-size:11.5px;color:var(--ink-soft);">${esc(eng.designation)||'Engineer'}</div>
      </div>
      <div style="flex:1;text-align:center;">
        ${cust.sig ? `<img src="${cust.sig}" style="max-width:100%;height:60px;object-fit:contain;border-bottom:1px solid var(--ink);">` : '<div style="height:60px;"></div>'}
        <div style="font-weight:700;font-size:13px;margin-top:4px;">${esc(cust.name)||'—'}</div>
        <div style="font-size:11.5px;color:var(--ink-soft);">${esc(cust.designation)||'Customer'}</div>
      </div>
    </div>
  </div>
  <div class="section">
    <h3>Customer Satisfaction</h3>
    <p class="stars" style="font-size:20px;margin:8px 0 4px;">${stars((d.csat||{}).rating)}</p>
    <p style="font-size:13px;">${esc((d.csat||{}).comment) || '<span style="color:var(--ink-soft);font-style:italic;">No comment</span>'}</p>
  </div>`;
}

async function openDetail(id){
  const overlay = document.getElementById('detailOverlay');
  const content = document.getElementById('detailContent');
  overlay.classList.add('show');
  content.innerHTML = 'Loading…';
  const d = await fetchOrder(id);
  const isInstall = d.orderType === 'installation';
  const j = d.job || {};

  let html = `<h2>${isInstall ? 'Machine Installation Order' : 'Field Service Work Order'}</h2>
  <div style="font-family:var(--mono);font-size:12px;color:var(--ink-soft);">WO ${esc(j.wo)||'—'}</div>
  <div class="section">
    <h3>Job Details</h3>
    <div class="kv">
      <div>Customer</div><div>${esc(j.customer)||'—'}</div>
      <div>Location</div><div>${esc(j.location)||'—'}</div>
      <div>Engineer</div><div>${esc(j.engineer)||'—'}</div>
      ${isInstall ? `<div>Dates</div><div>${esc(j.startDate)||'—'} to ${esc(j.endDate)||'—'}</div>` : `<div>Machine / Asset</div><div>${esc(j.machine)||'—'}</div><div>Date</div><div>${esc(j.date)||'—'}</div>`}
    </div>
  </div>`;

  if(isInstall){
    const sr = d.siteReadiness || {};
    html += `
    <div class="section">
      <h3>Site Readiness</h3>
      <div class="kv">
        <div>Power supply stable</div><div>${sr.power?'Yes':'No'}</div>
        <div>Network/LAN point</div><div>${sr.networkPoint?'Yes':'No'}</div>
        <div>Mounting ready</div><div>${sr.mounting?'Yes':'No'}</div>
        <div>Lighting adequate</div><div>${sr.lighting?'Yes':'No'}</div>
      </div>
      <p style="font-size:13px;margin-top:6px;">${esc(sr.notes)||'—'}</p>
    </div>
    <div class="section"><h3>Machines (${(d.machines||[]).length})</h3>
      ${(d.machines||[]).map((m,i)=>renderMachine(m,i)).join('')}
    </div>
    <div class="section">
      <h3>Training Provided</h3>
      ${(d.operators||[]).filter(o=>o.name).map(o=>`
        <div style="display:flex;gap:10px;align-items:center;border:1px solid var(--line);border-radius:8px;padding:8px;margin-top:6px;">
          ${o.photo?`<img src="${o.photo}" style="width:44px;height:44px;object-fit:cover;border-radius:6px;">`:''}
          <div style="flex:1;"><b>${esc(o.name)}</b><div style="font-size:12px;color:var(--ink-soft);">${esc(o.topic)||'—'}</div></div>
          ${o.sig?`<img src="${o.sig}" style="width:80px;height:32px;object-fit:contain;border-bottom:1px solid var(--ink);">`:''}
        </div>`).join('') || '<p style="color:var(--ink-soft);font-style:italic;font-size:13px;">None recorded</p>'}
    </div>
    <div class="section"><h3>Suggestion to Factory</h3><p style="font-size:13px;">${esc(d.suggestion)||'—'}</p></div>
    <div class="section"><h3>Maintenance Guide</h3><p style="font-size:13px;">${esc(d.maintenanceGuide)||'—'}</p></div>`;
  } else {
    const b = d.before||{photos:[]}, a = d.after||{photos:[]};
    html += `
    <div class="section"><h3>Before</h3>${imageGrid(b.photos)}<p style="font-size:13px;margin-top:6px;">${esc(b.comments)||'—'}</p></div>
    <div class="section"><h3>After</h3>${imageGrid(a.photos)}<p style="font-size:13px;margin-top:6px;">${esc(a.comments)||'—'}</p></div>
    <div class="section"><h3>Troubleshooting Log</h3>
      ${(d.troubleshoot||[]).map(e=>`<div style="font-size:13px;margin-bottom:4px;"><span style="font-family:var(--mono);color:var(--ink-soft);font-size:11px;">${esc(e.time)}</span> — ${esc(e.text)}</div>`).join('') || '<p style="color:var(--ink-soft);font-style:italic;font-size:13px;">None logged</p>'}
    </div>
    <div class="section"><h3>Parts Used</h3>
      <table style="width:100%;font-size:12.5px;">
        <thead><tr><th>Name</th><th>Part No.</th><th>Serial No.</th><th>Qty</th><th>Spec</th></tr></thead>
        <tbody>${(d.parts||[]).filter(p=>p.name||p.partNo).map(p=>`<tr><td>${esc(p.name)}</td><td>${esc(p.partNo)}</td><td>${esc(p.serialNo)}</td><td>${esc(p.qty)}</td><td>${esc(p.spec)||'—'}</td></tr>`).join('') || '<tr><td colspan="5">None recorded</td></tr>'}</tbody>
      </table>
    </div>`;
  }

  html += renderSignOff(d);
  content.innerHTML = html;
}

document.getElementById('closeDetail').onclick = ()=> document.getElementById('detailOverlay').classList.remove('show');
document.getElementById('detailOverlay').addEventListener('click', (e)=>{ if(e.target.id==='detailOverlay') e.currentTarget.classList.remove('show'); });
document.addEventListener('click', (e)=>{
  if(e.target.matches('[data-lightbox]')){
    const lb = document.createElement('div');
    lb.className = 'lightbox';
    lb.innerHTML = `<img src="${e.target.src}">`;
    lb.onclick = ()=>lb.remove();
    document.body.appendChild(lb);
  }
});
async function fetchAssignments(params){
  const qs = new URLSearchParams(params).toString();
  const res = await fetch(`${SUPA_URL}/rest/v1/assignments?order=scheduled_date.asc${qs?'&'+qs:''}`, { headers: supaHeaders() });
  return res.json();
}

function renderAssignTable(rows){
  const wrap = document.getElementById('assignTableWrap');
  if(!rows.length){ wrap.innerHTML = '<div class="empty">No assignments scheduled yet.</div>'; return; }
  wrap.innerHTML = `
  <table>
    <thead><tr><th>Engineer</th><th>Type</th><th>Customer</th><th>Location</th><th>Scheduled</th><th>Status</th><th>Notes</th><th></th></tr></thead>
    <tbody>
      ${rows.map(r=>`
        <tr>
          <td>${esc(r.engineer)}</td>
          <td><span class="chip ${r.order_type}">${r.order_type==='installation'?'Install':'Service'}</span></td>
          <td>${esc(r.customer)}</td>
          <td>${esc(r.location)||'—'}</td>
          <td>${esc(r.scheduled_date)||'—'}</td>
          <td><span class="status-chip ${r.status}">${r.status.replace('_',' ')}</span></td>
          <td style="max-width:220px;">${esc(r.notes)||'—'}</td>
          <td>${r.status!=='cancelled' && r.status!=='completed' ? `<button class="btn" style="padding:5px 10px;font-size:11px;background:var(--danger,#B04A3D);" data-cancel="${r.id}">Cancel</button>` : ''}</td>
        </tr>`).join('')}
    </tbody>
  </table>`;
  wrap.querySelectorAll('[data-cancel]').forEach(btn=>{
    btn.onclick = async ()=>{
      await fetch(`${SUPA_URL}/rest/v1/assignments?id=eq.${btn.getAttribute('data-cancel')}`, {
        method:'PATCH', headers: supaHeaders({'Content-Type':'application/json','Prefer':'return=minimal'}), body: JSON.stringify({status:'cancelled'})
      });
      loadAssignments();
    };
  });
}

async function loadAssignments(){
  const params = {};
  const eng = document.getElementById('afEngineer').value.trim();
  const status = document.getElementById('afStatus').value;
  if(eng) params.engineer = `ilike.*${eng}*`;
  if(status) params.status = `eq.${status}`;
  renderAssignTable(await fetchAssignments(params));
}

document.getElementById('createAssignment').onclick = async ()=>{
  const engineer = document.getElementById('aEngineer').value.trim();
  const customer = document.getElementById('aCustomer').value.trim();
  const statusEl = document.getElementById('assignStatus');
  if(!engineer || !customer){ statusEl.textContent = 'Engineer and Customer are required'; return; }
  const body = {
    order_type: document.getElementById('aType').value,
    engineer, customer,
    location: document.getElementById('aLocation').value.trim(),
    scheduled_date: document.getElementById('aDate').value,
    notes: document.getElementById('aNotes').value.trim()
  };
  statusEl.textContent = 'Saving…';
  try{
    const res = await fetch(`${SUPA_URL}/rest/v1/assignments`, { method:'POST', headers: supaHeaders({'Content-Type':'application/json','Prefer':'return=minimal'}), body: JSON.stringify(body) });
    if(!res.ok) throw new Error('status ' + res.status);
    statusEl.textContent = '✅ Scheduled';
    document.getElementById('aEngineer').value = '';
    document.getElementById('aCustomer').value = '';
    document.getElementById('aLocation').value = '';
    document.getElementById('aDate').value = '';
    document.getElementById('aNotes').value = '';
    loadAssignments();
  }catch(e){
    statusEl.textContent = '⚠️ ' + e.message;
  }
};

document.getElementById('applyAssignFilters').onclick = loadAssignments;

document.getElementById('tabOrders').onclick = ()=>{
  document.getElementById('tabOrders').classList.add('active');
  document.getElementById('tabAssignments').classList.remove('active');
  document.getElementById('ordersView').style.display = '';
  document.getElementById('assignmentsView').style.display = 'none';
};
document.getElementById('tabAssignments').onclick = ()=>{
  document.getElementById('tabAssignments').classList.add('active');
  document.getElementById('tabOrders').classList.remove('active');
  document.getElementById('assignmentsView').style.display = '';
  document.getElementById('ordersView').style.display = 'none';
  loadAssignments();
};

document.getElementById('openConfig').onclick = ()=>{
  document.getElementById('configOverlay').classList.add('show');
};

if(ensureConfigured()){ loadTable(); }
</script>
</body>
</html>
