  function bindOrderTypeGate(){
    if(state.gateView==='settings'){
      document.getElementById('settingsBackBtn').onclick = ()=>{ state.gateView='choose'; render(); };
      document.getElementById('settingsSaveBtn').onclick = ()=>{
        state.serverUrl = val('s_server_url').trim().replace(/\/+$/,'');
        state.supabaseKey = val('s_supabase_key').trim();
        storageSetSafe('settings:serverUrl', state.serverUrl);
        storageSetSafe('settings:supabaseKey', state.supabaseKey);
        toast('Settings saved');
        state.gateView = 'choose';
        render();
      };
      document.getElementById('logoutBtn').onclick = async ()=>{
        await clearSession();
        state.gateView = 'choose';
        render();
      };
      return;
    }
    if(state.gateView==='assigned'){
      document.getElementById('assignedBackBtn').onclick = ()=>{ state.gateView='choose'; render(); };
      document.querySelectorAll('[data-pick-assignment]').forEach(card=>{
        card.onclick = ()=>{
          const a = state.assignedList.find(x=>x.id===card.getAttribute('data-pick-assignment'));
          if(!a) return;
          applyAssignmentPrefill(a);
        };
      });
      return;
    }
    document.querySelectorAll('[data-choose]').forEach(card=>{
      card.onclick = async ()=>{
        state.orderType = card.getAttribute('data-choose');
        state.step = 0;
        if(!state.job.wo){
          try{ state.job.wo = await generateWoNumber(); }catch(e){}
        }
        render();
      };
    });
    const assignedCard = document.querySelector('[data-choose-assigned]');
    if(assignedCard) assignedCard.onclick = ()=>{ fetchAssignedOrders(); };
    const settingsBtn = document.getElementById('gateSettingsBtn');
    if(settingsBtn) settingsBtn.onclick = ()=>{ state.gateView = 'settings'; render(); };
  }

  async function fetchAssignedOrders(){
    state.gateView = 'assigned';
    state.assignedLoading = true;
    state.assignedError = '';
    render();
    try{
      const url = state.serverUrl.replace(/\/+$/,'');
      const key = state.supabaseKey;
      if(!url || !key) throw new Error('Set your Supabase URL and Anon Key in Settings first');
      await ensureFreshToken();
      const res = await fetch(
        `${url}/rest/v1/assignments?engineer=ilike.*${encodeURIComponent(state.userProfileName)}*&status=eq.scheduled&order=scheduled_date.asc`,
        { headers: { 'apikey': key, 'Authorization': `Bearer ${state.authToken}` } }
      );
      if(!res.ok) throw new Error('Supabase responded with status ' + res.status);
      state.assignedList = await res.json();
    }catch(e){
      state.assignedError = e.message || 'Could not reach the server';
    }
    state.assignedLoading = false;
    render();
  }

  // Searches prior installation orders for this customer and pulls out each
  // machine's specs, so an engineer filling a service call doesn't have to
  // retype what was already recorded when the machine was installed.
  async function lookupInstallationRecord(){
    state.showLookup = true;
    state.lookupLoading = true;
    state.lookupError = '';
    state.lookupResults = [];
    render();
    try{
      const url = (state.serverUrl || '').replace(/\/+$/,'');
      const key = state.supabaseKey;
      if(!url || !key) throw new Error('Supabase connection not set up');
      if(!state.job.customer.trim()) throw new Error('Enter the customer name first');
      await ensureFreshToken();
      const res = await fetch(
        `${url}/rest/v1/orders?order_type=eq.installation&customer=ilike.*${encodeURIComponent(state.job.customer.trim())}*&select=data&order=created_at.desc&limit=10`,
        { headers: { 'apikey': key, 'Authorization': `Bearer ${state.authToken}` } }
      );
      if(!res.ok) throw new Error('Supabase responded with status ' + res.status);
      const rows = await res.json();
      const machines = [];
      rows.forEach(r=>{
        (r.data && r.data.machines || []).forEach(m=>{
          machines.push({
            kmName: m.kmName, kmBrand: m.kmBrand, kmModel: m.kmModel, kmSerial: m.kmSerial,
            cabinetSerial: m.cabinetSerial, tailscaleIp: m.tailscaleIp, cabinetType: m.cabinetType,
            kmGauge: m.kmGauge, kmDiameter: m.kmDiameter, machineType: m.machineType
          });
        });
      });
      state.lookupResults = machines;
    }catch(e){
      state.lookupError = e.message || 'Could not search for installation records';
    }
    state.lookupLoading = false;
    render();
  }

  function pickLookupResult(idx){
    const m = state.lookupResults[idx];
    if(!m) return;
    state.job.machineDetails = m;
    if(!state.job.machine && m.kmName) state.job.machine = m.kmName;
    state.showLookup = false;
    render();
  }

  function applyAssignmentPrefill(a){
    state.orderType = a.order_type;
    state.currentAssignmentId = a.id;
    state.job.customer = a.customer || '';
    state.job.location = a.location || '';
    state.job.engineer = state.userProfileName || '';
    state.step = 0;
    if(!state.job.wo){ generateWoNumber().then(wo=>{ state.job.wo = wo; }); }
    // Let the office's prefill notes flow into Job details visibly for the engineer
    if(a.notes) toast('Assignment notes: ' + a.notes);
    render();
  }

    switch(currentKey()){

      case 'before': return photoCommentStep('before', 'Before Starting Work', 'Capture the machine / fault condition before touching anything, and log what you observe.');
      case 'troubleshoot': return troubleshootStep();
      case 'siteready': return siteReadyStep();
      case 'machines': return machinesStep();
      case 'parts': return partsStep();
      case 'training': return trainingStep();
      case 'suggestions': return suggestionsStep();
      case 'after': return photoCommentStep('after', 'After Work Completed', 'Capture the finished result and summarize the fix.');
      case 'report': return reportStep();

  function attachSigPad(canvasId, onSave, existingDataUrl, height){
    height = height || 160;
    const canvas = document.getElementById(canvasId);
    if(!canvas) return;
    const wrap = canvas.parentElement;
    const ratio = window.devicePixelRatio || 1;
    canvas.width = wrap.clientWidth * ratio;
    canvas.height = height * ratio;
    canvas.style.width = wrap.clientWidth+'px';
    canvas.style.height = height+'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(ratio, ratio);
    ctx.lineWidth = 2.2; ctx.lineCap = 'round'; ctx.strokeStyle = '#1B2229';
    let drawing = false, last = null;
    if(existingDataUrl){
      const img = new Image();
      img.onload = ()=>{ ctx.drawImage(img,0,0,wrap.clientWidth,height); };
      img.src = existingDataUrl;
    }
    function pos(e){ const rect = canvas.getBoundingClientRect(); const t = e.touches ? e.touches[0] : e; return { x: t.clientX-rect.left, y: t.clientY-rect.top }; }
    function start(e){ e.preventDefault(); drawing = true; last = pos(e); wrap.classList.add('sig-signed'); }
    function move(e){ if(!drawing) return; e.preventDefault(); const p = pos(e); ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke(); last = p; }
    function end(){ if(!drawing) return; drawing = false; onSave(canvas.toDataURL('image/png')); }
    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', end);
    canvas.addEventListener('touchstart', start, {passive:false});
    canvas.addEventListener('touchmove', move, {passive:false});
    canvas.addEventListener('touchend', end);
  }

  function openSigModal(target){
    closeSigModal();
    let existing = null;
    if(target.type==='engineer') existing = state.signOff.engineer.sig;
    else if(target.type==='customer') existing = state.signOff.customer.sig;
    else if(target.type==='operator') existing = state.operators[target.opIdx].sig;

    const overlay = document.createElement('div');
    overlay.id = 'sigModalOverlay';
    overlay.className = 'modal-backdrop';
    overlay.innerHTML = `
      <div class="modal-box" style="max-width:92vw;width:92vw;padding:16px;">
        <h3 style="margin-bottom:10px;">Sign here</h3>
        <div class="sig-wrap ${existing?'sig-signed':''}" id="sigModalWrap">
          <canvas class="sig-box" id="sigModalCanvas" style="height:min(50vh,320px);"></canvas>
          <div class="sig-hint">Sign here</div>
        </div>
        <div class="btn-row" style="margin-top:14px;">
          <button class="btn btn-outline-sm" id="sigModalClear" style="width:100%;">Clear</button>
          <button class="btn btn-primary" id="sigModalDone" style="width:100%;">Done</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);

    const canvas = document.getElementById('sigModalCanvas');
    const modalHeight = Math.min(window.innerHeight*0.5, 320);
    canvas.dataset.sig = existing || '';
    attachSigPad('sigModalCanvas', (url)=>{ canvas.dataset.sig = url; }, existing, modalHeight);

    document.getElementById('sigModalClear').onclick = ()=>{
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0,0,canvas.width,canvas.height);
      canvas.dataset.sig = '';
      document.getElementById('sigModalWrap').classList.remove('sig-signed');
    };

      else if(target.type==='operator') state.operators[target.opIdx].sig = finalSig;
      closeSigModal();
      render();
    };
  }

  // ================= Direct PDF generator (no browser print, no external libraries) =================
  const PDF_SCALE = 2;
  const PDF_PT_W = 595, PDF_PT_H = 842; // A4 in points
  const PDF_PAGE_W = PDF_PT_W * PDF_SCALE, PDF_PAGE_H = PDF_PT_H * PDF_SCALE;
  const PDF_MARGIN = 34 * PDF_SCALE;
  const PDF_COL = { navy:'#16232E', steel:'#3D6B8C', ink:'#1B2229', soft:'#5B6570', line:'#D9DCD9', amber:'#D68A2D' };

  function createPageManager(){
    const pages = [];
    const pm = { y: PDF_MARGIN, ctx: null };
    pm.newPage = function(){
      const canvas = document.createElement('canvas');
      canvas.width = PDF_PAGE_W; canvas.height = PDF_PAGE_H;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,PDF_PAGE_W,PDF_PAGE_H);
      pages.push(canvas);
      pm.ctx = ctx;
      pm.y = PDF_MARGIN;
    };
    pm.ensureSpace = function(h){
      if(pm.y + h > PDF_PAGE_H - PDF_MARGIN){ pm.newPage(); }
    };
    pm.pages = pages;
    pm.newPage();
    return pm;
  }

  function pdfWrapLines(ctx, str, font, maxWidth){
    ctx.font = font;
    const words = (str==null?'':String(str)).split(/\s+/).filter(w=>w.length);
    const lines = [];
    let line = '';
    words.forEach(w=>{
      const test = line ? line+' '+w : w;
      if(ctx.measureText(test).width > maxWidth && line){ lines.push(line); line = w; }
      else { line = test; }
    });
    if(line) lines.push(line);
    return lines.length ? lines : [''];
  }

  function pdfText(pm, str, x, opts){
    opts = opts || {};
    const size = (opts.size || 8.5) * PDF_SCALE;
    const weight = opts.weight || '400';
    const color = opts.color || PDF_COL.ink;
    const maxWidth = opts.maxWidth || (PDF_PAGE_W - PDF_MARGIN - x);
    const lineHeight = size * 1.4;
    const font = `${weight} ${size}px Arial, Helvetica, sans-serif`;
    const lines = pdfWrapLines(pm.ctx, str, font, maxWidth);
    lines.forEach(l=>{
      pm.ensureSpace(lineHeight);
      pm.ctx.font = font;
      pm.ctx.fillStyle = color;
      pm.ctx.textBaseline = 'alphabetic';
      pm.ctx.fillText(l, x, pm.y + size*0.85);
      pm.y += lineHeight;
    });
    return pm.y;
  }

  function pdfMeasureWrapHeight(pm, str, font, maxWidth){
    const lines = pdfWrapLines(pm.ctx, str, font, maxWidth);
    const size = parseInt(font.match(/(\d+)px/)[1], 10);
    return lines.length * size * 1.4;
  }

  function pdfSectionHeader(pm, title){
    pm.ensureSpace(30*PDF_SCALE);
    pm.y += 8*PDF_SCALE;
    const size = 10*PDF_SCALE;
    pm.ctx.font = `700 ${size}px Arial`;
    pm.ctx.fillStyle = PDF_COL.steel;
    pm.ctx.fillText(title.toUpperCase(), PDF_MARGIN, pm.y + size*0.85);
    pm.y += size*1.3;
    pm.ctx.strokeStyle = PDF_COL.line;
    pm.ctx.lineWidth = 1;
    pm.ctx.beginPath();
    pm.ctx.moveTo(PDF_MARGIN, pm.y);
    pm.ctx.lineTo(PDF_PAGE_W - PDF_MARGIN, pm.y);
    pm.ctx.stroke();
    pm.y += 8*PDF_SCALE;
  }

  function pdfBanner(pm, label){
    const h = 26*PDF_SCALE;
    pm.ensureSpace(h + 10*PDF_SCALE);
    pm.ctx.fillStyle = PDF_COL.amber;
    const w = PDF_PAGE_W - 2*PDF_MARGIN;
    roundRect(pm.ctx, PDF_MARGIN, pm.y, w, h, 4*PDF_SCALE);
    pm.ctx.fill();
    pm.ctx.fillStyle = '#241505';
    pm.ctx.font = `700 ${9*PDF_SCALE}px Arial`;
    pm.ctx.textAlign = 'center';
    pm.ctx.fillText(label.toUpperCase(), PDF_PAGE_W/2, pm.y + h/2 + 3*PDF_SCALE);
    pm.ctx.textAlign = 'left';
    pm.y += h + 10*PDF_SCALE;
  }

  function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function pdfKvTable(pm, rows){
    const labelW = 150*PDF_SCALE;
    const valX = PDF_MARGIN + labelW + 10*PDF_SCALE;
    const valW = PDF_PAGE_W - PDF_MARGIN - valX;
    const labelFont = `700 ${8.5*PDF_SCALE}px Arial`;
    const valFont = `400 ${8.5*PDF_SCALE}px Arial`;
    rows.forEach(([label, value])=>{
      const rowH = Math.max(pdfMeasureWrapHeight(pm, value, valFont, valW), 8.5*PDF_SCALE*1.4) + 6*PDF_SCALE;
      pm.ensureSpace(rowH);
      const rowTop = pm.y;
      pm.ctx.font = labelFont;
      pm.ctx.fillStyle = PDF_COL.soft;
      pm.ctx.fillText(label, PDF_MARGIN, pm.y + 8.5*PDF_SCALE);
      pm.y += 2*PDF_SCALE;
      const savedY = pm.y;
      pm.y = rowTop;
      pdfText(pm, value, valX, {size:8.5, maxWidth:valW});
      pm.y = Math.max(pm.y, savedY + 8.5*PDF_SCALE*1.4);
      pm.ctx.strokeStyle = PDF_COL.line;
      pm.ctx.lineWidth = 1;
      pm.ctx.beginPath();
      pm.ctx.moveTo(PDF_MARGIN, pm.y + 4*PDF_SCALE);
      pm.ctx.lineTo(PDF_PAGE_W - PDF_MARGIN, pm.y + 4*PDF_SCALE);
      pm.ctx.stroke();
      pm.y += 10*PDF_SCALE;
    });
  }

  function pdfImageGrid(pm, imgMap, urls, cols){
    cols = cols || 4;
    const gap = 8*PDF_SCALE;
    const cellW = (PDF_PAGE_W - 2*PDF_MARGIN - gap*(cols-1)) / cols;
    const cellH = cellW;
    if(!urls || !urls.length){
      pdfText(pm, 'No photos recorded.', PDF_MARGIN, {size:8, color:PDF_COL.soft});
      return;
    }
    for(let r=0; r<Math.ceil(urls.length/cols); r++){
      pm.ensureSpace(cellH + gap);
      const rowY = pm.y;
      for(let c=0;c<cols;c++){
        const idx = r*cols+c;
        if(idx>=urls.length) break;
        const x = PDF_MARGIN + c*(cellW+gap);
        const img = imgMap[urls[idx]];
        pm.ctx.strokeStyle = PDF_COL.line;
        pm.ctx.strokeRect(x, rowY, cellW, cellH);
        if(img){
          try{
            const ratio = Math.max(cellW/img.width, cellH/img.height);
            const dw = img.width*ratio, dh = img.height*ratio;
            pm.ctx.save();
            pm.ctx.beginPath();
            pm.ctx.rect(x, rowY, cellW, cellH);
            pm.ctx.clip();
            pm.ctx.drawImage(img, x + (cellW-dw)/2, rowY + (cellH-dh)/2, dw, dh);
            pm.ctx.restore();
          }catch(e){}
        }
      }
      pm.y = rowY + cellH + gap;
    }
  }

  async function pdfCollectImageUrls(customerCopy){
    const urls = [];
    if(state.orderType==='installation'){
      state.machines.forEach(m=>{ machineImageCats(m).forEach(([k])=>{ (m.images[k]||[]).forEach(u=>urls.push(u)); }); });
      state.operators.forEach(o=>{ if(o.photo) urls.push(o.photo); if(o.sig && !customerCopy) urls.push(o.sig); });
    } else {
      state.before.photos.forEach(u=>urls.push(u));
      state.after.photos.forEach(u=>urls.push(u));
      state.parts.forEach(p=>{ if(p.photo) urls.push(p.photo); });
    }
    if(!customerCopy){
      if(state.signOff.engineer.sig) urls.push(state.signOff.engineer.sig);
      if(state.signOff.customer.sig) urls.push(state.signOff.customer.sig);
    }
    return urls;
  }

  function preloadImageMap(urls){
    const map = {};
    const unique = [...new Set(urls)];
    return Promise.all(unique.map(u=>new Promise(res=>{
      const img = new Image();
      img.onload = ()=>{ map[u]=img; res(); };
      img.onerror = ()=>{ res(); };
      img.src = u;
    }))).then(()=>map);
  }

  function pdfSigOrPlaceholder(pm, x, w, sigUrl, imgMap, hideSig){
    const h = 32*PDF_SCALE;
    if(hideSig || !sigUrl || !imgMap[sigUrl]){
      pm.ctx.strokeStyle = PDF_COL.line;
      pm.ctx.strokeRect(x, pm.y, w, h);
      pm.ctx.fillStyle = PDF_COL.soft;
      pm.ctx.font = `italic 400 ${7.5*PDF_SCALE}px Arial`;
      pm.ctx.textAlign = 'center';
      pm.ctx.fillText(hideSig ? 'Signature on file' : 'Not signed', x+w/2, pm.y+h/2+3*PDF_SCALE);
      pm.ctx.textAlign = 'left';
    } else {
      const img = imgMap[sigUrl];
      const ratio = Math.min(w/img.width, h/img.height);
      const dw = img.width*ratio, dh = img.height*ratio;
      pm.ctx.drawImage(img, x+(w-dw)/2, pm.y+(h-dh)/2, dw, dh);
      pm.ctx.strokeStyle = PDF_COL.ink;
      pm.ctx.beginPath();
      pm.ctx.moveTo(x, pm.y+h);
      pm.ctx.lineTo(x+w, pm.y+h);
      pm.ctx.stroke();
    }
    return h;
  }

  function pdfSignOffAndCsat(pm, imgMap, hideSig){
    pdfSectionHeader(pm, 'Sign-Off');
    const colW = (PDF_PAGE_W - 2*PDF_MARGIN - 20*PDF_SCALE)/2;
    pm.ensureSpace(32*PDF_SCALE + 30*PDF_SCALE);
    const topY = pm.y;
    const leftX = PDF_MARGIN, rightX = PDF_MARGIN + colW + 20*PDF_SCALE;
    const sig = state.signOff;
    const hL = pdfSigOrPlaceholder(pm, leftX, colW, sig.engineer.sig, imgMap, hideSig);
    pm.y = topY;
    pdfSigOrPlaceholder(pm, rightX, colW, sig.customer.sig, imgMap, hideSig);
    pm.y = topY + hL + 6*PDF_SCALE;
    pm.ctx.font = `700 ${8.5*PDF_SCALE}px Arial`;
    pm.ctx.fillStyle = PDF_COL.ink;
    pm.ctx.fillText(sig.engineer.name || '—', leftX, pm.y+8*PDF_SCALE);
    pm.ctx.fillText(sig.customer.name || '—', rightX, pm.y+8*PDF_SCALE);
    pm.y += 11*PDF_SCALE;
    pm.ctx.font = `400 ${7.5*PDF_SCALE}px Arial`;
    pm.ctx.fillStyle = PDF_COL.soft;
    pm.ctx.fillText(sig.engineer.designation || 'Engineer', leftX, pm.y+8*PDF_SCALE);
    pm.ctx.fillText(sig.customer.designation || 'Customer', rightX, pm.y+8*PDF_SCALE);
    pm.y += 20*PDF_SCALE;

    pdfSectionHeader(pm, 'Customer Satisfaction');
    const csat = state.csat;
    const stars = '★'.repeat(csat.rating) + '☆'.repeat(5-csat.rating);
    pm.ensureSpace(16*PDF_SCALE);
    pm.ctx.font = `400 ${16*PDF_SCALE}px Arial`;
    pm.ctx.fillStyle = PDF_COL.amber;
    pm.ctx.textAlign = 'center';
    pm.ctx.fillText(stars, PDF_PAGE_W/2, pm.y+14*PDF_SCALE);
    pm.ctx.textAlign = 'left';
    pm.y += 22*PDF_SCALE;
    pdfText(pm, csat.comment || 'No comment provided', PDF_MARGIN, {size:8, color: csat.comment?PDF_COL.ink:PDF_COL.soft});
  }

  function pdfDefectTable(pm, defects){
    const cols = [
      {label:'Defect', w:0.28}, {label:'Captured', w:0.13}, {label:'Roll No.', w:0.13},
      {label:'Rotation No.', w:0.13}, {label:'Comments', w:0.33}
    ];
    const totalW = PDF_PAGE_W - 2*PDF_MARGIN;
    let cx = PDF_MARGIN;
    const colX = cols.map(c=>{ const x=cx; cx+=c.w*totalW; return x; });
    pm.ensureSpace(14*PDF_SCALE);
    pm.ctx.fillStyle = PDF_COL.steel; pm.ctx.fillRect(PDF_MARGIN, pm.y, totalW, 14*PDF_SCALE);
    pm.ctx.font = `700 ${7*PDF_SCALE}px Arial`;
    pm.ctx.fillStyle = '#fff';
    cols.forEach((c,i)=>pm.ctx.fillText(c.label, colX[i]+4*PDF_SCALE, pm.y+10*PDF_SCALE));
    pm.y += 14*PDF_SCALE;

    defects.forEach(d=>{
      const font = `400 ${7.5*PDF_SCALE}px Arial`;
      const vals = [d.label, d.captured==='yes'?'Yes':'No', d.rollNo||'—', d.rotationNo||'—', d.comment||'—'];
      const heights = vals.map((v,i)=>pdfMeasureWrapHeight(pm, v, font, cols[i].w*totalW - 8*PDF_SCALE));
      const rowH = Math.max(...heights, 7.5*PDF_SCALE*1.4) + 6*PDF_SCALE;
      pm.ensureSpace(rowH);
      const rowTop = pm.y;
      vals.forEach((v,i)=>{
        const savedY = pm.y;
        pm.y = rowTop;
        pdfText(pm, v, colX[i]+4*PDF_SCALE, {size:7.5, maxWidth: cols[i].w*totalW-8*PDF_SCALE});
        pm.y = Math.max(pm.y, savedY);
      });
      pm.y = rowTop + rowH;
      pm.ctx.strokeStyle = PDF_COL.line;
      pm.ctx.beginPath(); pm.ctx.moveTo(PDF_MARGIN, pm.y); pm.ctx.lineTo(PDF_PAGE_W-PDF_MARGIN, pm.y); pm.ctx.stroke();
    });
    pm.y += 8*PDF_SCALE;
  }

  function pdfOperators(pm, imgMap, hideSig){
    const named = state.operators.filter(o=>o.name);
    if(!named.length){ pdfText(pm, 'No operators recorded.', PDF_MARGIN, {size:8, color:PDF_COL.soft}); return; }
    named.forEach(o=>{
      const photoSize = 34*PDF_SCALE;
      const rowH = photoSize + 6*PDF_SCALE;
      pm.ensureSpace(rowH);
      const rowTop = pm.y;
      pm.ctx.strokeStyle = PDF_COL.line;
      pm.ctx.strokeRect(PDF_MARGIN, rowTop, photoSize, photoSize);
      const img = o.photo && imgMap[o.photo];
      if(img){
        const ratio = Math.max(photoSize/img.width, photoSize/img.height);
        const dw=img.width*ratio, dh=img.height*ratio;
        pm.ctx.save(); pm.ctx.beginPath(); pm.ctx.rect(PDF_MARGIN,rowTop,photoSize,photoSize); pm.ctx.clip();
        pm.ctx.drawImage(img, PDF_MARGIN+(photoSize-dw)/2, rowTop+(photoSize-dh)/2, dw, dh);
        pm.ctx.restore();
      }
      const textX = PDF_MARGIN + photoSize + 10*PDF_SCALE;
      const sigW = 90*PDF_SCALE;
      const textW = PDF_PAGE_W - PDF_MARGIN - sigW - 10*PDF_SCALE - textX;
      pm.y = rowTop;
      pm.ctx.font = `700 ${8.5*PDF_SCALE}px Arial`;
      pm.ctx.fillStyle = PDF_COL.ink;
      pm.ctx.fillText(o.name, textX, rowTop + 9*PDF_SCALE);
      pm.y = rowTop + 13*PDF_SCALE;
      pdfText(pm, o.topic || '—', textX, {size:7.5, color:PDF_COL.soft, maxWidth: textW});

      const sigX = PDF_PAGE_W - PDF_MARGIN - sigW;
      pm.y = rowTop;
      pdfSigOrPlaceholder(pm, sigX, sigW, o.sig, imgMap, hideSig);

      pm.y = rowTop + rowH;
      pm.ctx.strokeStyle = PDF_COL.line;
      pm.ctx.beginPath(); pm.ctx.moveTo(PDF_MARGIN, pm.y); pm.ctx.lineTo(PDF_PAGE_W-PDF_MARGIN, pm.y); pm.ctx.stroke();
      pm.y += 8*PDF_SCALE;
    });
  }

  function pdfMachineSection(pm, m, idx, imgMap){
    pdfSectionHeader(pm, `Machine ${idx+1}${m.kmName ? ': '+m.kmName : ''}`);
    pdfKvTable(pm, [
      ['Type of Machine', m.machineType||'—'],
      ['Knit-I Cabinet Serial No.', m.cabinetSerial||'—'],
      ['Tailscale IP', m.tailscaleIp||'—'],
      ['Cabinet Type', m.cabinetType||'—'],
      ['No. of Cameras', m.numCams||'—'],
      ['Knitting Machine Brand', m.kmBrand||'—'],
      ['Knitting Machine Model', m.kmModel||'—'],
      ['Knitting Machine Serial No.', m.kmSerial||'—'],
      ['Knitting Machine Name', m.kmName||'—'],
      ['Gauge / Diameter', `${m.kmGauge||'—'} / ${m.kmDiameter||'—'}`],
      ['Current Program Details', m.kmProgram||'—']
    ]);
    machineImageCats(m).forEach(([k,label])=>{
      const urls = m.images[k]||[];
      if(!urls.length) return;
      pm.ensureSpace(14*PDF_SCALE);
      pm.ctx.font = `700 ${7.5*PDF_SCALE}px Arial`;
      pm.ctx.fillStyle = PDF_COL.soft;
      pm.ctx.fillText(label.toUpperCase(), PDF_MARGIN, pm.y+7*PDF_SCALE);
      pm.y += 11*PDF_SCALE;
      pdfImageGrid(pm, imgMap, urls, 4);
    });
    pm.ensureSpace(14*PDF_SCALE);
    pm.y += 4*PDF_SCALE;

  function buildMinimalPdf(pageImages, pageWidthPt, pageHeightPt){
    const enc = new TextEncoder();
    const parts = [];
    let offset = 0;
    const offsets = {};
    function push(data){
      const bytes = typeof data === 'string' ? enc.encode(data) : data;
      parts.push(bytes);
      offset += bytes.length;
    }
    function startObj(num){ offsets[num] = offset; push(`${num} 0 obj\n`); }
    function endObj(){ push('endobj\n'); }

    push('%PDF-1.4\n');

    const numPages = pageImages.length;
    const catalogNum = 1, pagesNum = 2;
    const kids = [];
    for(let i=0;i<numPages;i++){ kids.push(3+i*3); }

    startObj(catalogNum);
    push(`<< /Type /Catalog /Pages ${pagesNum} 0 R >>\n`);
    endObj();

    startObj(pagesNum);
    push(`<< /Type /Pages /Kids [${kids.map(k=>k+' 0 R').join(' ')}] /Count ${numPages} >>\n`);
    endObj();

    for(let i=0;i<numPages;i++){
      const pageObj = 3+i*3, imgObj = 4+i*3, contentObj = 5+i*3;
      const img = pageImages[i];

      startObj(pageObj);
      push(`<< /Type /Page /Parent ${pagesNum} 0 R /MediaBox [0 0 ${pageWidthPt} ${pageHeightPt}] /Resources << /XObject << /Im0 ${imgObj} 0 R >> >> /Contents ${contentObj} 0 R >>\n`);
      endObj();

      startObj(imgObj);
      push(`<< /Type /XObject /Subtype /Image /Width ${img.width} /Height ${img.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${img.bytes.length} >>\nstream\n`);
      push(img.bytes);
      push('\nendstream\n');
      endObj();

      const contentStr = `q ${pageWidthPt} 0 0 ${pageHeightPt} 0 0 cm /Im0 Do Q`;
      const contentBytes = enc.encode(contentStr);
      startObj(contentObj);
      push(`<< /Length ${contentBytes.length} >>\nstream\n`);
      push(contentBytes);
      push('\nendstream\n');
      endObj();
    }

    const xrefOffset = offset;
    const totalObjs = 2 + numPages*3;
    push(`xref\n0 ${totalObjs+1}\n`);
    push('0000000000 65535 f \n');
    for(let n=1;n<=totalObjs;n++){
      const off = offsets[n] || 0;
      push(String(off).padStart(10,'0')+' 00000 n \n');
    }
    push(`trailer\n<< /Size ${totalObjs+1} /Root ${catalogNum} 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`);

    const total = parts.reduce((s,p)=>s+p.length,0);
    const result = new Uint8Array(total);
    let pos=0;
    for(const p of parts){ result.set(p,pos); pos+=p.length; }
    return result;
  }

  // ---- Supabase Storage: upload each embedded photo as a real file, replacing
  // the base64 data URL with the resulting public URL, so the database rows
  // stay small and photos are served directly by Supabase's CDN. ----
  async function uploadPhotoToSupabase(dataUrl, orderId, index, supabaseUrl, supabaseKey, authToken){
    if(!dataUrl || typeof dataUrl !== 'string' || !dataUrl.startsWith('data:')) return dataUrl;
    const match = dataUrl.match(/^data:image\/(\w+);base64,(.+)$/);
    if(!match) return dataUrl;
    const mime = match[1];
    const ext = mime === 'jpeg' ? 'jpg' : mime;
    const binStr = atob(match[2]);
    const bytes = new Uint8Array(binStr.length);
    for(let i=0;i<binStr.length;i++) bytes[i] = binStr.charCodeAt(i);
    const path = `${orderId}/img_${String(index).padStart(4,'0')}.${ext}`;
    const res = await fetch(`${supabaseUrl}/storage/v1/object/photos/${path}`, {
      method: 'POST',
      headers: {
        'apikey': supabaseKey,
        'Authorization': `Bearer ${authToken}`,
        'Content-Type': `image/${mime}`
      },
      body: bytes
    });
    if(!res.ok){
      let detail = '';
      try{ const body = await res.json(); detail = body.message || body.error || JSON.stringify(body); }catch(e){}
      throw new Error(`Photo upload failed (status ${res.status})${detail ? ': ' + detail : ''}`);
    }
    return `${supabaseUrl}/storage/v1/object/public/photos/${path}`;
  }

  async function uploadAllPhotos(payload, orderId, supabaseUrl, supabaseKey, authToken){
    let counter = 0;
    const next = () => counter++;
    const uploadArray = async (arr) => {
      if(!Array.isArray(arr)) return [];
      const out = [];
      for(const dataUrl of arr){ out.push(await uploadPhotoToSupabase(dataUrl, orderId, next(), supabaseUrl, supabaseKey, authToken)); }
      return out;
    };
    const uploadSingle = async (dataUrl) => dataUrl ? uploadPhotoToSupabase(dataUrl, orderId, next(), supabaseUrl, supabaseKey, authToken) : dataUrl;

    if(payload.before) payload.before.photos = await uploadArray(payload.before.photos);
    if(payload.after) payload.after.photos = await uploadArray(payload.after.photos);
    if(Array.isArray(payload.parts)){
      for(const p of payload.parts){ if(p.photo) p.photo = await uploadSingle(p.photo); }
    }
    if(Array.isArray(payload.machines)){
      for(const m of payload.machines){
        if(m.images){ for(const k of Object.keys(m.images)){ m.images[k] = await uploadArray(m.images[k]); } }
      }
    }
    if(Array.isArray(payload.operators)){
      for(const o of payload.operators){
        if(o.photo) o.photo = await uploadSingle(o.photo);
        if(o.sig) o.sig = await uploadSingle(o.sig);
      }
    }
    if(payload.signOff){
      if(payload.signOff.engineer && payload.signOff.engineer.sig) payload.signOff.engineer.sig = await uploadSingle(payload.signOff.engineer.sig);
      if(payload.signOff.customer && payload.signOff.customer.sig) payload.signOff.customer.sig = await uploadSingle(payload.signOff.customer.sig);
    }
    return payload;
  }

  // Does the actual work of getting one order into Supabase: upload photos,
  // insert the row, and mark any linked assignment completed. Used both for a
  // live submission and for retrying something that was queued while offline.
  async function performSubmission(rawPayload, assignmentId, supabaseUrl, supabaseKey, authToken){
    const orderId = crypto.randomUUID();
    const payload = await uploadAllPhotos(JSON.parse(JSON.stringify(rawPayload)), orderId, supabaseUrl, supabaseKey, authToken);
    delete payload.currentAssignmentId;
    const machineCount = Array.isArray(payload.machines) ? payload.machines.length : 0;

    const row = {
      id: orderId,
      order_type: payload.orderType || 'service',
      wo_number: (payload.job && payload.job.wo) || '',
      customer: (payload.job && payload.job.customer) || '',
      location: (payload.job && payload.job.location) || '',
      engineer: (payload.job && payload.job.engineer) || '',
      machine_count: machineCount,
      csat_rating: (payload.csat && payload.csat.rating) || 0,
      data: payload
    };

    const res = await fetch(`${supabaseUrl}/rest/v1/orders`, {
      method: 'POST',
      headers: {
        'apikey': supabaseKey,
        'Authorization': `Bearer ${authToken}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(row)
    });
    if(!res.ok){
      let detail = '';
      try{ const body = await res.json(); detail = body.message || body.error_description || body.hint || JSON.stringify(body); }catch(e){}
      throw new Error(`Supabase rejected the order (status ${res.status})${detail ? ': ' + detail : ''}`);
    }

    if(assignmentId){
      await fetch(`${supabaseUrl}/rest/v1/assignments?id=eq.${assignmentId}`, {
        method: 'PATCH',
        headers: {
          'apikey': supabaseKey,
          'Authorization': `Bearer ${authToken}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ status: 'completed', order_id: orderId })
      });
    }
    return orderId;
  }

  async function submitToServer(){
    const url = (state.serverUrl || '').trim().replace(/\/+$/,'');
    const key = (state.supabaseKey || '').trim();
    if(!url || !key){ toast('Supabase connection not set up'); return; }
    if(!state.authToken){ toast('You need to be signed in to submit'); return; }
    state.submitStatus = 'submitting';
    render();

    const ok = await ensureFreshToken();
    if(!ok && !state.authToken){
      await saveDraft();
      toast('Your session expired — sign in again, then submit. Your work is saved as a draft.');
      state.submitStatus = 'idle';
      render();
      return;
    }

    const payload = buildDraftSnapshot(false);
    const assignmentId = state.currentAssignmentId || null;

    try{
      const orderId = await performSubmission(payload, assignmentId, url, key, state.authToken);
      state.submitStatus = 'success';
      state.submittedOrderId = orderId;
    }catch(err){
      // Only genuine network failures (browser couldn't even reach the server —
      // these throw TypeError) get queued for automatic retry. Anything else
      // (bad request, expired session, permission error, etc.) is a real
      // problem retrying won't fix, so show it instead of hiding it.
      if(err instanceof TypeError){
        await enqueueSubmission(url, key, payload, assignmentId);
        state.submitStatus = 'queued';
      } else {
        state.submitStatus = 'error';
        state.submitError = (err && err.message) ? err.message : 'Submission failed — see console for details';
        console.error('Submission failed:', err);
      }
    }
    render();
  }

      document.getElementById('nextBtn').onclick = ()=>{
        state.machines.forEach(m=>{ state.recent.kmBrands = pushRecent(state.recent.kmBrands, m.kmBrand); });
        saveRecents();
        goNext();
      };
    }

    if(key==='training'){
      document.querySelectorAll('[data-operator]').forEach(inp=>{
        inp.oninput = ()=>{ const [f,idx] = inp.getAttribute('data-operator').split(':'); state.operators[parseInt(idx)][f] = inp.value; };
      });
      document.querySelectorAll('[data-op-photo-add]').forEach(inp=>{
        inp.onchange = async (e)=>{
          const idx = parseInt(inp.getAttribute('data-op-photo-add'));
          const file = e.target.files[0]; if(!file) return;
          const url = await fileToDataUrl(file);
          state.operators[idx].photo = url;
          render();
        };
      });
      document.querySelectorAll('[data-op-photo-remove]').forEach(btn=>{
        btn.onclick = (e)=>{ e.stopPropagation(); const idx = parseInt(btn.getAttribute('data-op-photo-remove')); state.operators[idx].photo = null; render(); };
      });
      document.querySelectorAll('[data-del-operator]').forEach(btn=>{
        btn.onclick = ()=>{ state.operators.splice(parseInt(btn.getAttribute('data-del-operator')),1); render(); };
      });
      document.getElementById('addOperator').onclick = ()=>{ state.operators.push(mkOperator()); render(); };
      document.querySelectorAll('[data-enlarge-sig]').forEach(btn=>{
        btn.onclick = ()=>{
          const idx = parseInt(btn.getAttribute('data-enlarge-sig').split(':')[1]);
          openSigModal({type:'operator', opIdx: idx});
        };
      });
      document.querySelectorAll('[data-clear-op-sig]').forEach(btn=>{
        btn.onclick = ()=>{
          const idx = btn.getAttribute('data-clear-op-sig');
          const canvas = document.getElementById('sig_operator_'+idx);
          const ctx = canvas.getContext('2d');
          ctx.clearRect(0,0,canvas.width,canvas.height);
          state.operators[parseInt(idx)].sig = null;
          document.getElementById('op_sig_wrap_'+idx).classList.remove('sig-signed');
        };
      });
      document.getElementById('backBtn').onclick = goBack;
      document.getElementById('nextBtn').onclick = goNext;
    }

    if(key==='suggestions'){
      document.getElementById('backBtn').onclick = ()=>{ state.suggestion = val('sugg_text'); state.maintenanceGuide = val('maint_text'); goBack(); };
      document.getElementById('nextBtn').onclick = ()=>{ state.suggestion = val('sugg_text'); state.maintenanceGuide = val('maint_text'); goNext(); };
    }

    if(key==='report'){
      document.getElementById('backBtn').onclick = goBack;
      document.getElementById('nextBtn').onclick = goNext;
    }

    if(key==='signoff'){
      document.getElementById('backBtn').onclick = goBack;
      document.getElementById('nextBtn').onclick = ()=>{
        state.signOff.engineer.name = val('eng_name');
        state.signOff.engineer.designation = val('eng_desig');
        state.signOff.customer.name = val('cust_name');
        state.signOff.customer.designation = val('cust_desig');
        if(!state.signOff.engineer.sig || !state.signOff.customer.sig){ toast('Both signatures are required'); return; }
        if(!state.signOff.engineer.name || !state.signOff.customer.name){ toast('Enter both names'); return; }
        goNext();
      };
      ['engineer','customer'].forEach(who=>{
        const btn = document.getElementById('clear_'+who);
        if(btn) btn.onclick = ()=>{
          const canvas = document.getElementById('sig_'+who);
          const ctx = canvas.getContext('2d');
          ctx.clearRect(0,0,canvas.width,canvas.height);
          state.signOff[who].sig = null;
          document.getElementById(who==='engineer'?'eng_sig_wrap':'cust_sig_wrap').classList.remove('sig-signed');
        };
      });
      document.querySelectorAll('[data-enlarge-sig]').forEach(btn=>{
        const target = btn.getAttribute('data-enlarge-sig');
        if(target==='engineer' || target==='customer'){
          btn.onclick = ()=>openSigModal({type: target});
        }
      });
    }

    if(key==='csat'){
      document.querySelectorAll('[data-star]').forEach(star=>{
        star.onclick = ()=>{ state.csat.rating = parseInt(star.getAttribute('data-star')); render(); };
      });
      document.getElementById('backBtn').onclick = goBack;
      const nextBtn = document.getElementById('nextBtn');
      if(nextBtn) nextBtn.onclick = ()=>{
        state.csat.comment = val('csat_comment');
        if(!state.csat.rating){ toast('Please rate the service'); return; }
        goNext();
        clearDraft();
        toast('Order submitted');
      };
    }

    if(key==='done'){
      document.getElementById('downloadPdfFullBtn').onclick = ()=>downloadPdfDirect(false);
      document.getElementById('downloadPdfCustomerBtn').onclick = ()=>downloadPdfDirect(true);
      document.getElementById('downloadFullBtn').onclick = ()=>downloadReport(false);
      document.getElementById('downloadCustomerBtn').onclick = ()=>downloadReport(true);
      const submitBtn = document.getElementById('submitServerBtn');
      if(submitBtn) submitBtn.onclick = ()=> submitToServer();
      document.getElementById('newWo').onclick = ()=>{ state.showResetConfirm = true; render(); };
      const cancelBtn = document.getElementById('cancelReset');
      if(cancelBtn) cancelBtn.onclick = ()=>{ state.showResetConfirm = false; render(); };
      const confirmBtn = document.getElementById('confirmReset');
      if(confirmBtn) confirmBtn.onclick = ()=>{ resetState(); render(); };
    }
  }

  function resetState(){
    state.orderType = null;
    state.step = 0;
    state.machineMode = 'single';
    state.numMachines = 2;
    state.job = { wo:"", customer:"", location:"", machine:"", engineer:"", date:new Date().toISOString().slice(0,10), startDate:new Date().toISOString().slice(0,10), endDate:"", machineDetails: null };
    state.lookupResults = [];
    state.lookupLoading = false;
    state.lookupError = '';
    state.showLookup = false;
    state.before = { photos:[], comments:"" };
    state.troubleshoot = [];
    state.parts = [ mkPart() ];
    state.siteReadiness = { power:false, networkPoint:false, mounting:false, lighting:false, notes:"" };
    state.machines = [ mkMachine() ];
    state.operators = [ mkOperator() ];
    state.suggestion = "";
    state.maintenanceGuide = "";
    state.after = { photos:[], comments:"" };
    state.signOff = { engineer:{name:"",designation:"",sig:null}, customer:{name:"",designation:"",sig:null} };
    state.csat = { rating:0, comment:"" };
    state.showResetConfirm = false;
    state.submitStatus = 'idle';
    state.submitError = '';
    state.submittedOrderId = '';
    state.gateView = 'choose';
    state.currentAssignmentId = null;
    state.assignedList = [];
    state.assignedError = '';
    clearDraft();
  }

  document.addEventListener('click', function(e){
    const img = e.target.closest('.report img');
    if(!img) return;
    const overlay = document.createElement('div');
    overlay.className = 'img-lightbox-backdrop';
    const big = document.createElement('img');
    big.src = img.src;
    overlay.appendChild(big);
    overlay.onclick = ()=>overlay.remove();
    document.body.appendChild(overlay);
  });

  document.addEventListener('visibilitychange', ()=>{ if(document.hidden) saveDraft(); else flushSubmissionQueue(); });
  window.addEventListener('pagehide', ()=>{ saveDraft(); });
  window.addEventListener('online', ()=>{ toast('Back online — syncing…'); flushSubmissionQueue(); });
  setInterval(saveDraft, 20000);
  setInterval(flushSubmissionQueue, 30000);
  setInterval(()=>{ if(state.authToken) ensureFreshToken(); }, 5*60*1000);

  async function woInit(){
    try{
      const raw = await storageGetSafe('draft:order');
      if(raw){ state.pendingDraft = JSON.parse(raw); }
    }catch(e){}
    await loadRecents();
    state.serverUrl = DEFAULT_SUPABASE_URL || '';
    state.supabaseKey = DEFAULT_SUPABASE_KEY || '';
    const savedUrl = await storageGetSafe('settings:serverUrl');
    if(savedUrl) state.serverUrl = savedUrl;
    const savedKey = await storageGetSafe('settings:supabaseKey');
    if(savedKey) state.supabaseKey = savedKey;

    const savedToken = await storageGetSafe('session:authToken');
    if(savedToken){
      state.authToken = savedToken;
      state.authRefreshToken = (await storageGetSafe('session:refreshToken')) || '';
      state.userId = (await storageGetSafe('session:userId')) || '';
      state.userEmail = (await storageGetSafe('session:userEmail')) || '';
      state.userRole = (await storageGetSafe('session:userRole')) || '';
      state.userProfileName = (await storageGetSafe('session:userProfileName')) || '';
    }

    flushSubmissionQueue();
    render();
  }
  // Exposed so the dashboard page (when this file is merged in rather than
  // opened standalone) can force a re-check of login/session state whenever
  // the "New Order" tab is opened — this script only runs once at page load,
  // which may be before the dashboard user has actually logged in yet.
  window.woRefresh = woInit;
  woInit();
})();

</script>
</body>
</html>
