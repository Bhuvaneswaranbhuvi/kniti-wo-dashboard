<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knit-I Work Orders — Dashboard</title>
<style>
  :root{
    --navy:#16232E; --navy-2:#1F3140; --steel:#3D6B8C; --steel-light:#DCE7ED; --amber:#D68A2D; --amber-dark:#B5701C;
    --paper:#F6F5F1; --card:#FFFFFF; --line:#D9DCD9; --ink:#1B2229; --ink-soft:#5B6570; --success:#3D7A54; --danger:#B04A3D;
    --mono:'SFMono-Regular',Consolas,monospace; --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);}
  header{background:var(--navy);color:#fff;padding:18px 24px;position:relative;}
  header h1{margin:0;font-size:18px;}
  header .sub{color:#B9C6CF;font-size:12.5px;margin-top:3px;}
  .wrap{max-width:1100px;margin:0 auto;padding:20px;}
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
  .filters input,.filters select{padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px;background:#fff;}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;border:1px solid var(--line);}
  th,td{padding:10px 12px;text-align:left;font-size:13px;border-bottom:1px solid var(--line);}
  th{background:var(--steel-light);color:var(--navy);text-transform:uppercase;font-size:10.5px;letter-spacing:.04em;}
  tr:last-child td{border-bottom:none;}
  tr.row{cursor:pointer;}
  tr.row:hover{background:#FAFBFC;}
  .chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:700;text-transform:uppercase;}
  .chip.service{background:#E4EEF3;color:var(--steel);}
  .chip.installation{background:#FCEED4;color:#8A5A17;}
  .stars{color:var(--amber);}
  .empty{padding:40px;text-align:center;color:var(--ink-soft);}
  .tabs{display:flex;gap:6px;margin-bottom:16px;}
  .tabBtn{padding:9px 16px;border:1px solid var(--line);background:#fff;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink-soft);}
  .tabBtn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
  .card-panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:16px;}
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;}
  .form-grid input,.form-grid select{padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px;}
  .status-chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:700;text-transform:uppercase;}
  .status-chip.scheduled{background:#E4EEF3;color:var(--steel);}
  .status-chip.in_progress{background:#FCEED4;color:#8A5A17;}
  .status-chip.completed{background:#DCEFE1;color:#2C6B3F;}
  .status-chip.cancelled{background:#F3DCDC;color:#8A2C2C;}

  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:12px;}
  .cal-daylabel{text-align:center;font-size:10.5px;text-transform:uppercase;color:var(--ink-soft);font-weight:700;padding-bottom:4px;}
  .cal-cell{background:#fff;border:1px solid var(--line);border-radius:6px;min-height:80px;padding:6px;font-size:11px;}
  .cal-cell.today{border-color:var(--steel);border-width:2px;}
  .cal-cell.empty{background:transparent;border:none;}
  .cal-date{font-weight:700;color:var(--ink-soft);margin-bottom:4px;}
  .cal-item{border-radius:4px;padding:2px 5px;margin-bottom:3px;font-size:10px;line-height:1.3;cursor:pointer;}
  .cal-item.scheduled{background:#E4EEF3;color:var(--steel);}
  .cal-item.in_progress{background:#FCEED4;color:#8A5A17;}
  .cal-item.overdue{background:#F3DCDC;color:#8A2C2C;font-weight:700;}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .cal-nav button{padding:6px 14px;}
  .overdue-banner{background:#F3DCDC;border:1px solid #E0A8A0;border-radius:8px;padding:12px;margin-bottom:16px;}
  .overdue-banner h3{color:#8A2C2C;border:none;margin:0 0 8px;padding:0;}
  #detailOverlay{position:fixed;inset:0;background:rgba(10,14,18,.6);display:none;align-items:flex-start;justify-content:center;overflow:auto;padding:30px 16px;z-index:100;}
  .modal-overlay{position:fixed;inset:0;background:rgba(10,14,18,.6);display:none;align-items:center;justify-content:center;overflow:auto;padding:30px 16px;z-index:150;}
  .modal-overlay.show{display:flex;}
  #detailOverlay.show{display:flex;}
  .detail-box{background:#fff;border-radius:10px;max-width:800px;width:100%;padding:26px;position:relative;}
  .detail-box h2{margin-top:0;}
  .detail-box .closeBtn{position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink-soft);}
  .section{margin-top:20px;}
  .section h3{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--steel);border-bottom:1px solid var(--line);padding-bottom:5px;}
  .kv{display:grid;grid-template-columns:200px 1fr;gap:6px 12px;font-size:13px;margin-top:8px;}
  .kv div:nth-child(odd){color:var(--ink-soft);}
  .imgs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px;}
  .imgs img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:6px;border:1px solid var(--line);cursor:zoom-in;}
  .machine-block{border:1px solid var(--line);border-radius:8px;padding:14px;margin-top:10px;}
  .btn{padding:9px 16px;border:none;border-radius:7px;background:var(--navy);color:#fff;font-size:13px;cursor:pointer;font-weight:600;}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200;cursor:zoom-out;}
  .lightbox img{max-width:92%;max-height:92%;}
  @media print{ header,.filters,.closeBtn,.no-print{display:none!important;} #detailOverlay{position:static;background:none;padding:0;} .detail-box{box-shadow:none;} }

  /* ===== Scoped styles for the embedded New Order wizard (from work_order.html) ===== */
#woApp *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
#woApp{padding-bottom:40px;}
#woApp{max-width:640px;margin:0 auto;background:var(--paper);}
#woApp .header{background:var(--navy);color:#fff;padding:18px 18px 14px;position:sticky;top:0;z-index:20;}
#woApp .header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
#woApp .header-title{font-size:15px;letter-spacing:.08em;text-transform:uppercase;color:var(--amber);font-weight:700;}
#woApp .header-wo{font-family:var(--mono);font-size:13px;color:#B9C6CF;margin-top:2px;}
#woApp .status-chip{font-size:10px;letter-spacing:.06em;text-transform:uppercase;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);padding:4px 9px;border-radius:20px;color:#DCE7ED;white-space:nowrap;}
#woApp .progress-track{display:flex;gap:4px;margin-top:14px;}
#woApp .progress-seg{flex:1;height:4px;border-radius:3px;background:rgba(255,255,255,.15);}
#woApp .progress-seg.done{background:var(--amber);}
#woApp .progress-seg.active{background:#fff;}
#woApp .step-label{margin-top:8px;font-size:12px;color:#B9C6CF;}
#woApp .step-label b{color:#fff;}
#woApp .content{padding:18px;}
#woApp .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:18px;margin-bottom:16px;}
#woApp .card h2{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--steel);margin:0 0 4px;font-weight:700;}
#woApp .card .sub{font-size:12.5px;color:var(--ink-soft);margin:0 0 16px;}
#woApp label.field-label{display:block;font-size:12px;font-weight:600;color:var(--ink);margin:14px 0 6px;}
#woApp label.field-label:first-child{margin-top:0;}
#woApp input[type=text], #woApp input[type=date], #woApp textarea, #woApp select{
    width:100%;border:1px solid var(--line);border-radius:7px;padding:10px 11px;font-size:14.5px;
    background:#FCFCFB;color:var(--ink);font-family:var(--sans);
  }
#woApp input:focus, #woApp textarea:focus, #woApp select:focus{outline:2px solid var(--steel);outline-offset:1px;border-color:var(--steel);}
#woApp textarea{resize:vertical;min-height:64px;}
#woApp .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
#woApp .btn{appearance:none;border:none;border-radius:8px;padding:12px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans);display:inline-flex;align-items:center;justify-content:center;gap:8px;}
#woApp .btn-primary{background:var(--navy);color:#fff;width:100%;}
#woApp .btn-primary:active{background:var(--navy-2);}
#woApp .btn-amber{background:var(--amber);color:#241505;width:100%;}
#woApp .btn-amber:active{background:var(--amber-dark);}
#woApp .btn-ghost{background:transparent;color:var(--steel);border:1px solid var(--steel-light);width:100%;}
#woApp .btn-outline-sm{background:transparent;color:var(--ink-soft);border:1px solid var(--line);padding:7px 12px;font-size:12.5px;font-weight:600;}
#woApp .btn-danger-sm{background:transparent;color:var(--danger);border:1px solid #E5C9C3;padding:7px 12px;font-size:12.5px;font-weight:600;}
#woApp .btn-row{display:flex;gap:10px;margin-top:18px;}
#woApp .btn-row .btn{flex:1;width:auto;}
#woApp .btn:disabled{opacity:.4;cursor:not-allowed;}
#woApp .photo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:6px;}
#woApp .report-photo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:6px;}
#woApp .report-photo-grid img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:6px;border:1px solid var(--line);}
#woApp .photo-slot{position:relative;border:1.5px dashed var(--line);border-radius:8px;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#FAFAF8;cursor:pointer;}
#woApp .photo-slot img{width:100%;height:100%;object-fit:cover;}
#woApp .photo-slot .placeholder{text-align:center;color:var(--ink-soft);font-size:11.5px;padding:8px;}
#woApp .photo-slot .placeholder .icon{font-size:22px;display:block;margin-bottom:4px;}
#woApp .photo-slot input{position:absolute;inset:0;opacity:0;cursor:pointer;}
#woApp .photo-slot .remove-x{position:absolute;top:4px;right:4px;background:rgba(20,20,20,.65);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:13px;line-height:1;cursor:pointer;z-index:2;}
#woApp .photo-tag{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.55));color:#fff;font-size:10px;padding:12px 6px 4px;text-align:center;text-transform:uppercase;letter-spacing:.05em;}
#woApp .log-entry{border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:8px;background:#FCFCFB;}
#woApp .log-entry .meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10.5px;color:var(--ink-soft);margin-bottom:4px;}
#woApp .log-entry .txt{font-size:13.5px;line-height:1.4;}
#woApp .empty-note{font-size:12.5px;color:var(--ink-soft);font-style:italic;padding:8px 0;}
#woApp .part-card{border:1px solid var(--line);border-radius:8px;padding:12px;margin-bottom:10px;background:#FCFCFB;}
#woApp .part-card .part-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
#woApp .part-card .part-head .idx{font-family:var(--mono);font-size:11px;color:var(--steel);font-weight:700;}
#woApp .part-photo-row{display:flex;gap:10px;align-items:center;margin-top:8px;}
#woApp .part-photo-thumb{width:56px;height:56px;border-radius:6px;border:1px solid var(--line);object-fit:cover;flex-shrink:0;background:#F1F1EE;}
#woApp .part-photo-btn{position:relative;flex-shrink:0;}
#woApp .part-photo-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;}
#woApp .sig-box{border:1.5px solid var(--line);border-radius:8px;background:#fff;touch-action:none;width:100%;height:160px;display:block;}
#woApp .sig-wrap{position:relative;}
#woApp .sig-hint{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:11px;color:#B6BDC2;pointer-events:none;}
#woApp .sig-signed .sig-hint{display:none;}
#woApp .stars{display:flex;gap:6px;justify-content:center;margin:10px 0 4px;}
#woApp .star{font-size:38px;cursor:pointer;color:#D9DCD9;line-height:1;user-select:none;transition:color .1s;}
#woApp .star.on{color:var(--amber);}
#woApp .csat-label{text-align:center;font-size:12.5px;color:var(--ink-soft);min-height:16px;}
#woApp .check-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px;}
#woApp .check-row:last-of-type{border-bottom:none;}
#woApp .check-row input{width:18px;height:18px;flex-shrink:0;}
#woApp .order-choice{cursor:pointer;transition:border-color .15s;}
#woApp .order-choice:active{border-color:var(--steel);}
#woApp .machine-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
#woApp .machine-header .idx{font-family:var(--mono);color:var(--steel);font-weight:700;font-size:12px;}
#woApp .machine-header .summary{font-size:14px;font-weight:600;margin-top:2px;}
#woApp .machine-header .chev{font-size:20px;color:var(--ink-soft);}
#woApp .defect-row{border:1px solid var(--line);border-radius:8px;padding:10px;margin-bottom:8px;background:#FCFCFB;}
#woApp .defect-row .dhead{display:flex;justify-content:space-between;align-items:center;}
#woApp .defect-label-static{font-weight:600;font-size:14px;}
#woApp .defect-label-input{font-weight:600;border:none;background:transparent;padding:0;font-size:14px;width:60%;}
#woApp .photo-mini-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:6px;}
#woApp .photo-mini-grid .photo-slot{aspect-ratio:1/1;}
#woApp .op-photo-slot{width:100px;aspect-ratio:1/1;}
#woApp .report{background:#fff;border:1px solid var(--line);border-radius:10px;padding:20px;font-size:13.5px;line-height:1.5;}
#woApp .report h1{font-size:17px;margin:0 0 2px;}
#woApp .report .rmeta{font-family:var(--mono);font-size:11.5px;color:var(--ink-soft);margin-bottom:16px;}
#woApp .report h3{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--steel);border-bottom:1px solid var(--line);padding-bottom:5px;margin:18px 0 8px;}
#woApp .report h4{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin:12px 0 6px;}
#woApp .report table{width:100%;border-collapse:collapse;font-size:12.5px;}
#woApp .report table th, #woApp .report table td{border:1px solid var(--line);padding:6px 8px;text-align:left;}
#woApp .report table th{background:var(--steel-light);font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--navy-2);}
#woApp .report .img-pair{display:flex;gap:10px;margin-top:6px;}
#woApp .report .img-pair figure{flex:1;margin:0;}
#woApp .report .img-pair img{width:100%;border-radius:6px;border:1px solid var(--line);object-fit:cover;aspect-ratio:4/3;}
#woApp .report .img-pair figcaption{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin-top:4px;text-align:center;}
#woApp .report .sig-final{display:flex;gap:14px;margin-top:6px;}
#woApp .report .sig-final .who{flex:1;text-align:center;}
#woApp .report .sig-final img{width:100%;height:70px;object-fit:contain;border-bottom:1.5px solid var(--ink);}
#woApp .report .sig-final .name{font-size:12.5px;font-weight:700;margin-top:6px;}
#woApp .report .sig-final .desig{font-size:11px;color:var(--ink-soft);}
#woApp .report .csat-final{text-align:center;}
#woApp .report .csat-final .stars-static{font-size:24px;color:var(--amber);letter-spacing:2px;}
#woApp .report .op-row{display:flex;gap:12px;align-items:center;border:1px solid var(--line);border-radius:8px;padding:10px;margin-bottom:8px;}
#woApp .report .op-row img.op-photo{width:50px;height:50px;object-fit:cover;border-radius:6px;background:#F1F1EE;}
#woApp .report .op-row img.op-sig{width:100px;height:40px;object-fit:contain;border-bottom:1.5px solid var(--ink);}
@media print{#woApp .header, #woApp .no-print{display:none !important;}#woApp .app{max-width:100%;}#woApp body{background:#fff;}#woApp .content{padding:0;}#woApp .report{border:none;padding:0;}
  }#woApp .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;}
#woApp .toast.show{opacity:1;}
#woApp .modal-backdrop{position:fixed;inset:0;background:rgba(15,20,25,.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
#woApp .modal-box{background:#fff;border-radius:12px;padding:20px;max-width:340px;width:100%;}
#woApp .modal-box h3{margin:0 0 8px;font-size:16px;}
#woApp .modal-box p{margin:0;font-size:13.5px;color:var(--ink-soft);}
#woApp .report img{cursor:zoom-in;}
#woApp .img-lightbox-backdrop{position:fixed;inset:0;background:rgba(10,14,18,.88);display:flex;align-items:center;justify-content:center;z-index:500;padding:24px;cursor:zoom-out;}
#woApp .img-lightbox-backdrop img{max-width:100%;max-height:100%;border-radius:6px;box-shadow:0 10px 40px rgba(0,0,0,.5);cursor:zoom-out;}
</style>
</head>
<body>
<header>
  <h1>Knit-I Work Orders</h1>
  <div class="sub" id="headerSub">All submissions and scheduled work across engineers</div>
  <button class="tabBtn no-print" id="openConfig" style="position:absolute;top:18px;right:24px;background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.3);display:none;">⚙️ Account</button>
</header>

<div id="authScreen" class="modal-overlay show">
  <div class="detail-box" style="max-width:420px;" id="authScreenContent"></div>
</div>

<div class="wrap" id="mainWrap" style="display:none;">
  <div class="tabs no-print">
    <button class="tabBtn" id="tabNewOrder">+ New Order</button>
    <button class="tabBtn active" id="tabOrders">Submitted Orders</button>
    <button class="tabBtn" id="tabSchedule">Schedule</button>
    <button class="tabBtn" id="tabAssignments">Assignments (Scheduling)</button>
    <button class="tabBtn" id="tabAdmin">Admin</button>
  </div>

  <div id="newOrderView" style="display:none;">
    <div class="app" id="woApp"></div>
  </div>

  <div id="ordersView">
    <div class="filters">
      <input type="text" id="fEngineer" placeholder="Engineer">
      <input type="text" id="fCustomer" placeholder="Customer / Mill">
      <select id="fType">
        <option value="">All Types</option>
        <option value="service">Service / Repair</option>
        <option value="installation">Installation</option>
      </select>
      <button class="btn" id="applyFilters">Filter</button>
      <button class="btn" style="background:transparent;color:var(--steel);border:1px solid var(--steel-light);" id="clearFilters">Clear</button>
    </div>
    <div id="tableWrap"></div>
  </div>

  <div id="scheduleView" style="display:none;">
    <div id="scheduleContent"></div>
  </div>

  <div id="assignmentsView" style="display:none;">
    <div class="card-panel">
      <h3 style="margin-top:0;">Schedule a New Order</h3>
      <div class="form-grid">
        <select id="aType">
          <option value="service">Service / Repair</option>
          <option value="installation">Installation</option>
        </select>
        <input type="text" id="aEngineer" placeholder="Engineer name">
        <input type="text" id="aCustomer" placeholder="Customer / Mill">
        <input type="text" id="aLocation" placeholder="Location">
        <input type="date" id="aDate">
      </div>
      <textarea id="aNotes" placeholder="Notes for the engineer (what to expect, machine count, access instructions...)" rows="2" style="width:100%;margin-top:10px;padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:13px;"></textarea>
      <button class="btn" id="createAssignment" style="margin-top:10px;">+ Schedule Order</button>
      <span id="assignStatus" style="margin-left:10px;font-size:12.5px;color:var(--ink-soft);"></span>
    </div>

    <div class="filters" style="margin-top:16px;">
      <input type="text" id="afEngineer" placeholder="Engineer">
      <select id="afStatus">
        <option value="">All Statuses</option>
        <option value="scheduled">Scheduled</option>
        <option value="in_progress">In Progress</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <button class="btn" id="applyAssignFilters">Filter</button>
    </div>
    <div id="assignTableWrap"></div>
  </div>

  <div id="adminView" style="display:none;">
    <div id="adminContent"></div>
  </div>
</div>

<div id="detailOverlay">
  <div class="detail-box">
    <button class="closeBtn no-print" id="closeDetail">✕</button>
    <div id="detailContent">Loading…</div>
    <div class="no-print" style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn" id="detailDownloadPdf">⬇️ Download PDF</button>
      <button class="btn" style="background:transparent;color:var(--steel);border:1px solid var(--steel-light);" id="detailDownloadHtml">⬇️ Download HTML</button>
      <button class="btn" style="background:transparent;color:var(--ink-soft);border:1px solid var(--line);" onclick="window.print()">🖨️ Print</button>

<script>
// ============================================================
// ADMIN: set these two once, then redistribute/redeploy this page so
// nobody has to type in Supabase details manually. (Project Settings
// → API in your Supabase dashboard.) Leave blank to require manual
// entry per device instead.
// ============================================================
const DEFAULT_SUPABASE_URL = '';
const DEFAULT_SUPABASE_KEY = '';
// ============================================================

let SUPA_URL = localStorage.getItem('settings:serverUrl') || DEFAULT_SUPABASE_URL || '';
let SUPA_KEY = localStorage.getItem('settings:supabaseKey') || DEFAULT_SUPABASE_KEY || '';
let AUTH_TOKEN = localStorage.getItem('session:authToken') || '';
let REFRESH_TOKEN = localStorage.getItem('session:refreshToken') || '';
let ME = {
  id: localStorage.getItem('session:userId') || '',
  email: localStorage.getItem('session:userEmail') || '',
  name: localStorage.getItem('session:userProfileName') || '',
  role: localStorage.getItem('session:userRole') || ''
};
let authView = 'login'; // 'connect' | 'login' | 'signup'

function supaHeaders(extra){
  return Object.assign({ 'apikey': SUPA_KEY, 'Authorization': `Bearer ${AUTH_TOKEN}` }, extra || {});
}

function saveSession(){
  localStorage.setItem('session:authToken', AUTH_TOKEN);
  localStorage.setItem('session:refreshToken', REFRESH_TOKEN);
  localStorage.setItem('session:userId', ME.id);
  localStorage.setItem('session:userEmail', ME.email);
  localStorage.setItem('session:userProfileName', ME.name);
  localStorage.setItem('session:userRole', ME.role);
}
function clearSession(){
  AUTH_TOKEN = ''; REFRESH_TOKEN = '';
  ME = { id:'', email:'', name:'', role:'' };
  ['session:authToken','session:refreshToken','session:userId','session:userEmail','session:userProfileName','session:userRole'].forEach(k=>localStorage.removeItem(k));
}

// Same expiry risk as work_order.html — an admin can leave the dashboard open
// for a long time reviewing reports, so refresh proactively instead of
// failing partway through a request.
function decodeJwtPayload(token){
  try{
    const part = token.split('.')[1];
    const json = atob(part.replace(/-/g,'+').replace(/_/g,'/'));
    return JSON.parse(json);
  }catch(e){ return null; }
}
function isTokenExpiringSoon(token, bufferSeconds){
  bufferSeconds = bufferSeconds || 120;
  const payload = decodeJwtPayload(token);
  if(!payload || !payload.exp) return true;
  return (payload.exp * 1000) < (Date.now() + bufferSeconds * 1000);
}
let refreshInFlight = null;
async function ensureFreshToken(){
  if(!AUTH_TOKEN || !REFRESH_TOKEN || !SUPA_URL || !SUPA_KEY) return false;
  if(!isTokenExpiringSoon(AUTH_TOKEN)) return true;
  if(refreshInFlight) return refreshInFlight;
  refreshInFlight = (async ()=>{
    try{
      const res = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=refresh_token`, {
        method: 'POST',
        headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh_token: REFRESH_TOKEN })
      });
      const data = await res.json();
      if(!res.ok || !data.access_token){ clearSession(); return false; }
      AUTH_TOKEN = data.access_token;
      REFRESH_TOKEN = data.refresh_token || REFRESH_TOKEN;
      saveSession();
      return true;
    }catch(e){ return false; }
    finally { refreshInFlight = null; }
  })();
  return refreshInFlight;
}
setInterval(()=>{ if(AUTH_TOKEN) ensureFreshToken(); }, 5*60*1000);

function renderAuthScreen(){
  const box = document.getElementById('authScreenContent');
  if(!SUPA_URL || !SUPA_KEY){
    box.innerHTML = `
      <h2 style="margin-top:0;">Connect to Supabase</h2>
      <p class="sub" style="margin-bottom:14px;">Paste your project's URL and anon/public API key (Project Settings → API in Supabase).</p>
      <label style="font-size:12px;font-weight:600;display:block;margin-bottom:4px;">Supabase URL</label>
      <input type="text" id="cfgUrl" value="${SUPA_URL}" placeholder="https://xxxx.supabase.co" style="width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;margin-bottom:10px;">
      <label style="font-size:12px;font-weight:600;display:block;margin-bottom:4px;">Anon Key</label>
      <input type="text" id="cfgKey" value="${SUPA_KEY}" placeholder="Paste the anon/public key" style="width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;margin-bottom:14px;">
      <button class="btn" id="configSave">Save & Continue</button>`;
    document.getElementById('configSave').onclick = ()=>{
      SUPA_URL = document.getElementById('cfgUrl').value.trim().replace(/\/+$/,'');
      SUPA_KEY = document.getElementById('cfgKey').value.trim();
      if(!SUPA_URL || !SUPA_KEY){ return; }
      localStorage.setItem('settings:serverUrl', SUPA_URL);
      localStorage.setItem('settings:supabaseKey', SUPA_KEY);
      renderAuthScreen();
    };
    return;
  }

  const isSignup = authView === 'signup';
  box.innerHTML = `
    <h2 style="margin-top:0;">${isSignup ? 'Create Account' : 'Sign In'}</h2>
    ${isSignup ? `
      <label style="font-size:12px;font-weight:600;display:block;margin-bottom:4px;">Your Name</label>
      <input type="text" id="authName" placeholder="Full name" style="width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;margin-bottom:10px;">
    ` : ''}
    <label style="font-size:12px;font-weight:600;display:block;margin-bottom:4px;">Email</label>
    <input type="text" id="authEmail" placeholder="you@counton.ai" style="width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;margin-bottom:10px;">
    <label style="font-size:12px;font-weight:600;display:block;margin-bottom:4px;">Password</label>
    <input type="password" id="authPassword" placeholder="Password" style="width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;margin-bottom:10px;">
    <div id="authErr" style="color:var(--danger,#B04A3D);font-size:12.5px;margin-bottom:10px;"></div>
    <button class="btn" id="authSubmit" style="width:100%;margin-bottom:8px;">${isSignup ? 'Create Account' : 'Sign In'}</button>
    <button class="btn" id="authToggle" style="width:100%;background:transparent;color:var(--steel);border:1px solid var(--steel-light);margin-bottom:8px;">${isSignup ? 'Already have an account? Sign In' : 'New here? Create an Account'}</button>
    <button class="btn" id="authReconnect" style="width:100%;background:transparent;color:var(--ink-soft);border:1px solid var(--line);">Change Supabase Project</button>`;

  document.getElementById('authToggle').onclick = ()=>{ authView = isSignup ? 'login' : 'signup'; renderAuthScreen(); };
  document.getElementById('authReconnect').onclick = ()=>{
    SUPA_URL = ''; SUPA_KEY = '';
    localStorage.removeItem('settings:serverUrl'); localStorage.removeItem('settings:supabaseKey');
    renderAuthScreen();
  };
  document.getElementById('authSubmit').onclick = async ()=>{
    const email = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    const errEl = document.getElementById('authErr');
    errEl.textContent = '';
    if(!email || !password){ errEl.textContent = 'Email and password are required'; return; }
    try{
      const endpoint = isSignup ? '/auth/v1/signup' : '/auth/v1/token?grant_type=password';
      const body = isSignup
        ? { email, password, data: { name: document.getElementById('authName').value.trim() || email } }
        : { email, password };
      const res = await fetch(`${SUPA_URL}${endpoint}`, {
        method: 'POST',
        headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error_description || data.msg || data.error || ('Request failed (status ' + res.status + ')'));
      if(!data.access_token) throw new Error(isSignup ? 'Account created — sign in now (or confirm your email first, if required).' : 'Sign in did not return a session.');
      AUTH_TOKEN = data.access_token;
      REFRESH_TOKEN = data.refresh_token || '';
      ME.id = data.user && data.user.id ? data.user.id : '';
      ME.email = data.user && data.user.email ? data.user.email : email;
      const pRes = await fetch(`${SUPA_URL}/rest/v1/profiles?id=eq.${ME.id}&select=name,role`, { headers: supaHeaders() });
      const profiles = await pRes.json();
      if(!profiles.length) throw new Error('No profile found yet — try signing in again in a moment.');
      ME.name = profiles[0].name || ME.email;
      ME.role = profiles[0].role || 'engineer';
      saveSession();
      showMainApp();
    }catch(err){
      errEl.textContent = err.message || 'Something went wrong';
    }
  };
}

function showMainApp(){
  document.getElementById('authScreen').classList.remove('show');
  document.getElementById('mainWrap').style.display = '';
  document.getElementById('openConfig').style.display = '';
  document.getElementById('headerSub').textContent = `Signed in as ${ME.name} (${ME.role})`;
  document.getElementById('tabAdmin').style.display = ME.role === 'admin' ? '' : 'none';
  document.getElementById('tabAssignments').style.display = (ME.role === 'admin' || ME.role === 'coordinator') ? '' : 'none';
  loadTable();
}

function showAuthScreen(){
  document.getElementById('mainWrap').style.display = 'none';
  document.getElementById('openConfig').style.display = 'none';
  document.getElementById('authScreen').classList.add('show');
  renderAuthScreen();
}

document.getElementById('openConfig').onclick = ()=>{
  if(confirm('Sign out?')){ clearSession(); showAuthScreen(); }
};

async function fetchOrders(params){
  const qs = new URLSearchParams(params).toString();
  const res = await fetch(`${SUPA_URL}/rest/v1/orders?select=id,order_type,wo_number,customer,location,engineer,machine_count,csat_rating,created_at&order=created_at.desc${qs?'&'+qs:''}`, { headers: supaHeaders() });
  return res.json();
}
async function fetchOrder(id){
  const res = await fetch(`${SUPA_URL}/rest/v1/orders?id=eq.${id}&select=data`, { headers: supaHeaders() });
  const rows = await res.json();
  return rows[0] ? rows[0].data : {};

}

function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(iso){ try{ return new Date(iso).toLocaleString(undefined,{month:'short',day:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }catch(e){ return iso; } }
function stars(n){ return '★'.repeat(n||0) + '☆'.repeat(5-(n||0)); }

function renderTable(rows){
  const wrap = document.getElementById('tableWrap');
  if(!rows.length){ wrap.innerHTML = '<div class="empty">No orders submitted yet.</div>'; return; }
  wrap.innerHTML = `
  <table>
    <thead><tr>
      <th>WO #</th><th>Type</th><th>Customer</th><th>Location</th><th>Engineer</th><th>Machines</th><th>CSAT</th><th>Submitted</th>
    </tr></thead>
    <tbody>
      ${rows.map(r=>`
        <tr class="row" data-id="${r.id}">
          <td>${esc(r.wo_number)||'—'}</td>
          <td><span class="chip ${r.order_type}">${r.order_type==='installation'?'Install':'Service'}</span></td>
          <td>${esc(r.customer)||'—'}</td>
          <td>${esc(r.location)||'—'}</td>
          <td>${esc(r.engineer)||'—'}</td>
          <td>${r.machine_count||0}</td>
          <td class="stars">${stars(r.csat_rating)}</td>
          <td>${fmtDate(r.created_at)}</td>
        </tr>`).join('')}
    </tbody>
  </table>`;
  wrap.querySelectorAll('tr.row').forEach(tr=>{
    tr.onclick = ()=>openDetail(tr.getAttribute('data-id'));
  });
}

async function loadTable(){
  const params = {};
  const eng = document.getElementById('fEngineer').value.trim();
  const cust = document.getElementById('fCustomer').value.trim();
  const type = document.getElementById('fType').value;
  if(eng) params.engineer = `ilike.*${eng}*`;
  if(cust) params.customer = `ilike.*${cust}*`;
  if(type) params.order_type = `eq.${type}`;
  const rows = await fetchOrders(params);
  renderTable(rows);
}

function imageGrid(urls){
  if(!urls || !urls.length) return '<p style="color:var(--ink-soft);font-style:italic;font-size:13px;">No photos</p>';
  return `<div class="imgs">${urls.map(u=>`<img src="${u}" data-lightbox="1">`).join('')}</div>`;
}

      <div>Gauge / Diameter</div><div>${esc(m.kmGauge)||'—'} / ${esc(m.kmDiameter)||'—'}</div>
      <div>Program Details</div><div>${esc(m.kmProgram)||'—'}</div>
    </div>
    ${imgBlocks}
    <table style="margin-top:10px;width:100%;font-size:12.5px;">

async function openDetail(id){

      <div>Engineer</div><div>${esc(j.engineer)||'—'}</div>

      <div>Serial No.</div><div>${esc(j.machineDetails.kmSerial)||'—'}</div>

      ${(d.operators||[]).filter(o=>o.name).map(o=>`
        <div style="display:flex;gap:10px;align-items:center;border:1px solid var(--line);border-radius:8px;padding:8px;margin-top:6px;">

          <div style="flex:1;"><b>${esc(o.name)}</b><div style="font-size:12px;color:var(--ink-soft);">${esc(o.topic)||'—'}</div></div>

        </div>`).join('') || '<p style="color:var(--ink-soft);font-style:italic;font-size:13px;">None recorded</p>'}
    </div>
    <div class="section"><h3>Suggestion to Factory</h3><p style="font-size:13px;">${esc(d.suggestion)||'—'}</p></div>
    <div class="section"><h3>Maintenance Guide</h3><p style="font-size:13px;">${esc(d.maintenanceGuide)||'—'}</p></div>`;
  } else {

    html += `
    <div class="section"><h3>Before</h3>${imageGrid(b.photos)}<p style="font-size:13px;margin-top:6px;">${esc(b.comments)||'—'}</p></div>

document.getElementById('detailDownloadHtml').onclick = ()=>{ if(currentOrderDetail) downloadOrderHtml(currentOrderDetail); };

function downloadOrderHtml(d){
  const styleTags = document.querySelector('style').outerHTML;
  const bodyHtml = document.getElementById('detailContent').innerHTML;
  const wo = (d.job && d.job.wo) || 'order';
  const doc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${esc(wo)}</title>${styleTags}<style>body{background:#fff;padding:20px;}</style></head><body>${bodyHtml}</body></html>`;
  const blob = new Blob([doc], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Order_${String(wo).replace(/[^a-z0-9-_]/gi,'_')}.html`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 3000);
}

document.getElementById('detailOverlay').addEventListener('click', (e)=>{ if(e.target.id==='detailOverlay') e.currentTarget.classList.remove('show'); });
document.addEventListener('click', (e)=>{
  if(e.target.matches('[data-lightbox]')){

function todayStr(){ return new Date().toISOString().slice(0,10); }
function isOverdue(a){
  if(a.status==='completed' || a.status==='cancelled') return false;
  if(!a.scheduled_date) return false;
  return a.scheduled_date < todayStr();
}

let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth(); // 0-indexed

function renderCalendar(assignments){
  const byDate = {};
  assignments.forEach(a=>{
    if(!a.scheduled_date) return;
    (byDate[a.scheduled_date] = byDate[a.scheduled_date] || []).push(a);
  });

  const firstOfMonth = new Date(calYear, calMonth, 1);
  const startWeekday = firstOfMonth.getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const monthLabel = firstOfMonth.toLocaleString(undefined, { month:'long', year:'numeric' });
  const today = todayStr();

  const dayLabels = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-daylabel">${d}</div>`).join('');
  let cells = '';
  for(let i=0;i<startWeekday;i++) cells += `<div class="cal-cell empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const items = byDate[dateStr] || [];
    const isToday = dateStr === today;
    cells += `
      <div class="cal-cell ${isToday?'today':''}">
        <div class="cal-date">${d}</div>
        ${items.map(a=>{
          const cls = isOverdue(a) ? 'overdue' : a.status;
          return `<div class="cal-item ${cls}" data-cal-item="${a.id}" title="${esc(a.customer)} — ${esc(a.engineer)}">${esc(a.engineer)}: ${esc(a.customer)}</div>`;
        }).join('')}
      </div>`;
  }

  return `
    <div class="cal-nav no-print">
      <button class="btn" style="padding:8px 14px;" id="calPrev">← Prev</button>
      <h3 style="border:none;margin:0;padding:0;font-size:14px;color:var(--ink);">${monthLabel}</h3>
      <button class="btn" style="padding:8px 14px;" id="calNext">Next →</button>
    </div>
    <div class="cal-grid">${dayLabels}${cells}</div>`;
}

async function loadSchedule(){
  const wrap = document.getElementById('scheduleContent');
  wrap.innerHTML = '<p class="sub">Loading…</p>';
  const all = await fetchAssignments({});
  const active = all.filter(a=>a.status!=='completed' && a.status!=='cancelled');
  const overdue = active.filter(isOverdue).sort((a,b)=>(a.scheduled_date||'').localeCompare(b.scheduled_date||''));
  const upcoming = active.filter(a=>!isOverdue(a)).sort((a,b)=>(a.scheduled_date||'').localeCompare(b.scheduled_date||''));

  const overdueBlock = overdue.length ? `
    <div class="overdue-banner">
      <h3>⚠️ Overdue (${overdue.length})</h3>
      ${overdue.map(a=>`
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #E0A8A0;font-size:13px;">
          <span><b>${esc(a.engineer)}</b> — ${esc(a.customer)} (${esc(a.location)||'—'})</span>
          <span style="color:#8A2C2C;">Was due ${esc(a.scheduled_date)}</span>
        </div>`).join('')}
    </div>` : '';

  const upcomingBlock = `
    <h3 style="border-bottom:1px solid var(--line);padding-bottom:6px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--steel);">Upcoming Visits</h3>
    ${upcoming.length ? `
    <table style="margin-bottom:20px;">
      <thead><tr><th>Date</th><th>Engineer</th><th>Customer</th><th>Location</th><th>Type</th><th>Status</th></tr></thead>
      <tbody>
        ${upcoming.map(a=>`
          <tr>
            <td>${esc(a.scheduled_date)||'—'}</td>
            <td>${esc(a.engineer)}</td>
            <td>${esc(a.customer)}</td>
            <td>${esc(a.location)||'—'}</td>
            <td><span class="chip ${a.order_type}">${a.order_type==='installation'?'Install':'Service'}</span></td>
            <td><span class="status-chip ${a.status}">${a.status.replace('_',' ')}</span></td>
          </tr>`).join('')}
      </tbody>
    </table>` : '<p class="sub" style="margin-bottom:20px;">Nothing scheduled.</p>'}`;

  wrap.innerHTML = `
    ${overdueBlock}
    ${upcomingBlock}
    <h3 style="border-bottom:1px solid var(--line);padding-bottom:6px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--steel);">Calendar</h3>
    ${renderCalendar(active)}
  `;

  const prevBtn = document.getElementById('calPrev');
  const nextBtn = document.getElementById('calNext');
  if(prevBtn) prevBtn.onclick = ()=>{ calMonth--; if(calMonth<0){ calMonth=11; calYear--; } loadSchedule(); };
  if(nextBtn) nextBtn.onclick = ()=>{ calMonth++; if(calMonth>11){ calMonth=0; calYear++; } loadSchedule(); };
}

function renderEngineerPerformance(orders){
  const byEng = {};
  orders.forEach(o=>{
    const eng = o.engineer || '(unassigned)';
    if(!byEng[eng]) byEng[eng] = { csatSum:0, csatCount:0, mills:new Set(), machinesInstalled:0, models:new Set(), orderCount:0 };
    const b = byEng[eng];
    b.orderCount++;
    if(o.customer) b.mills.add(o.customer);
    if(o.csat_rating){ b.csatSum += o.csat_rating; b.csatCount++; }
    if(o.order_type === 'installation' && o.data && Array.isArray(o.data.machines)){
      b.machinesInstalled += o.data.machines.length;
      o.data.machines.forEach(m=>{
        if(m.machineType) b.models.add(m.machineType);
        if(m.kmModel) b.models.add(m.kmModel);
      });
    }
  });

  const rows = Object.keys(byEng).sort().map(eng=>{
    const b = byEng[eng];
    const avgCsat = b.csatCount ? (b.csatSum / b.csatCount).toFixed(1) : '—';
    return `
      <tr>
        <td>${esc(eng)}</td>
        <td>${b.orderCount}</td>
        <td>${avgCsat}${b.csatCount ? ` <span style="color:var(--amber);">${'★'.repeat(Math.round(b.csatSum/b.csatCount))}</span>` : ''}</td>
        <td>${b.mills.size}</td>
        <td>${b.machinesInstalled}</td>
        <td>${b.models.size}</td>
      </tr>`;
  }).join('');

  document.getElementById('engPerfWrap').innerHTML = rows ? `
    <table>
      <thead><tr><th>Engineer</th><th>Orders</th><th>Avg CSAT</th><th>Mills Attended</th><th>Machines Installed</th><th>Models Experienced</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>` : '<div class="empty">No orders submitted yet.</div>';
}

function renderPartsAnalytics(orders){
  const partCounts = {}; // partKey -> {count, engineers:Set, machines:Set}
  const byEngineerParts = {}; // engineer -> total parts count
  const byMillParts = {}; // customer -> { total, parts: {partKey: count} }

  orders.forEach(o=>{
    if(!o.data || !Array.isArray(o.data.parts)) return;
    const eng = o.engineer || '(unassigned)';
    const mill = o.customer || '(unknown mill)';
    o.data.parts.forEach(p=>{
      const label = p.name || p.partNo || 'Unnamed part';
      const key = label + (p.partNo ? ` (${p.partNo})` : '');
      const qty = parseInt(p.qty,10) || 1;
      if(!partCounts[key]) partCounts[key] = { count:0, engineers:new Set(), machines:new Set() };
      partCounts[key].count += qty;
      partCounts[key].engineers.add(eng);
      if(o.data.job && o.data.job.machine) partCounts[key].machines.add(o.data.job.machine);
      byEngineerParts[eng] = (byEngineerParts[eng] || 0) + qty;

      if(!byMillParts[mill]) byMillParts[mill] = { total:0, parts:{} };
      byMillParts[mill].total += qty;
      byMillParts[mill].parts[key] = (byMillParts[mill].parts[key] || 0) + qty;
    });
  });

  const partRows = Object.keys(partCounts)
    .sort((a,b)=>partCounts[b].count - partCounts[a].count)
    .map(key=>{
      const p = partCounts[key];
      return `<tr>
        <td>${esc(key)}</td>
        <td><b>${p.count}</b></td>
        <td>${[...p.engineers].map(esc).join(', ')}</td>
        <td>${[...p.machines].map(esc).join(', ') || '—'}</td>
      </tr>`;
    }).join('');

  const engRows = Object.keys(byEngineerParts).sort().map(eng=>
    `<tr><td>${esc(eng)}</td><td>${byEngineerParts[eng]}</td></tr>`
  ).join('');

  const millRows = Object.keys(byMillParts)
    .sort((a,b)=>byMillParts[b].total - byMillParts[a].total)
    .map(mill=>{
      const m = byMillParts[mill];
      const topParts = Object.keys(m.parts)
        .sort((a,b)=>m.parts[b]-m.parts[a])
        .map(k=>`${esc(k)} (${m.parts[k]})`)
        .join(', ');
      return `<tr><td>${esc(mill)}</td><td><b>${m.total}</b></td><td>${topParts}</td></tr>`;
    }).join('');

  document.getElementById('partsAnalyticsWrap').innerHTML = partRows ? `
    <p class="sub" style="margin-bottom:8px;">Most-replaced parts (highest first) — a proxy for which parts fail most.</p>
    <table style="margin-bottom:20px;">
      <thead><tr><th>Part</th><th>Times Replaced</th><th>Engineers Involved</th><th>Machines / Assets</th></tr></thead>
      <tbody>${partRows}</tbody>
    </table>
    <p class="sub" style="margin-bottom:8px;">Parts replaced by mill / factory</p>
    <table style="margin-bottom:20px;">
      <thead><tr><th>Mill / Factory</th><th>Total Parts</th><th>Parts (breakdown)</th></tr></thead>
      <tbody>${millRows}</tbody>
    </table>
    <p class="sub" style="margin-bottom:8px;">Parts replaced per engineer</p>
    <table>
      <thead><tr><th>Engineer</th><th>Total Parts Used</th></tr></thead>
      <tbody>${engRows}</tbody>
    </table>` : '<div class="empty">No parts recorded yet.</div>';
}

const PDF_SCALE = 2;
const PDF_PT_W = 595, PDF_PT_H = 842;
const PDF_PAGE_W = PDF_PT_W * PDF_SCALE, PDF_PAGE_H = PDF_PT_H * PDF_SCALE;
const PDF_MARGIN = 34 * PDF_SCALE;
const PDF_COL = { navy:'#16232E', steel:'#3D6B8C', ink:'#1B2229', soft:'#5B6570', line:'#D9DCD9', amber:'#D68A2D' };

function createPageManager(){
  const pages = [];
  const pm = { y: PDF_MARGIN, ctx: null };
  pm.newPage = function(){
    const canvas = document.createElement('canvas');
    canvas.width = PDF_PAGE_W; canvas.height = PDF_PAGE_H;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,PDF_PAGE_W,PDF_PAGE_H);
    pages.push(canvas);
    pm.ctx = ctx;
    pm.y = PDF_MARGIN;
  };
  pm.ensureSpace = function(h){ if(pm.y + h > PDF_PAGE_H - PDF_MARGIN){ pm.newPage(); } };
  pm.pages = pages;
  pm.newPage();
  return pm;
}

function pdfWrapLines(ctx, str, font, maxWidth){
  ctx.font = font;
  const words = (str==null?'':String(str)).split(/\s+/).filter(w=>w.length);
  const lines = [];
  let line = '';
  words.forEach(w=>{
    const test = line ? line+' '+w : w;
    if(ctx.measureText(test).width > maxWidth && line){ lines.push(line); line = w; }
    else { line = test; }
  });
  if(line) lines.push(line);
  return lines.length ? lines : [''];
}

function pdfText(pm, str, x, opts){
  opts = opts || {};
  const size = (opts.size || 8.5) * PDF_SCALE;
  const weight = opts.weight || '400';
  const color = opts.color || PDF_COL.ink;
  const maxWidth = opts.maxWidth || (PDF_PAGE_W - PDF_MARGIN - x);
  const lineHeight = size * 1.4;
  const font = `${weight} ${size}px Arial, Helvetica, sans-serif`;
  const lines = pdfWrapLines(pm.ctx, str, font, maxWidth);
  lines.forEach(l=>{
    pm.ensureSpace(lineHeight);
    pm.ctx.font = font;
    pm.ctx.fillStyle = color;
    pm.ctx.textBaseline = 'alphabetic';
    pm.ctx.fillText(l, x, pm.y + size*0.85);
    pm.y += lineHeight;
  });
  return pm.y;
}

function pdfMeasureWrapHeight(pm, str, font, maxWidth){
  const lines = pdfWrapLines(pm.ctx, str, font, maxWidth);
  const size = parseInt(font.match(/(\d+)px/)[1], 10);
  return lines.length * size * 1.4;
}

function pdfSectionHeader(pm, title){
  pm.ensureSpace(30*PDF_SCALE);
  pm.y += 8*PDF_SCALE;
  const size = 10*PDF_SCALE;
  pm.ctx.font = `700 ${size}px Arial`;
  pm.ctx.fillStyle = PDF_COL.steel;
  pm.ctx.fillText(title.toUpperCase(), PDF_MARGIN, pm.y + size*0.85);
  pm.y += size*1.3;
  pm.ctx.strokeStyle = PDF_COL.line;
  pm.ctx.lineWidth = 1;
  pm.ctx.beginPath();
  pm.ctx.moveTo(PDF_MARGIN, pm.y);
  pm.ctx.lineTo(PDF_PAGE_W - PDF_MARGIN, pm.y);
  pm.ctx.stroke();
  pm.y += 8*PDF_SCALE;
}

function pdfBanner(pm, label){
  const h = 26*PDF_SCALE;
  pm.ensureSpace(h + 10*PDF_SCALE);
  pm.ctx.fillStyle = PDF_COL.amber;
  const w = PDF_PAGE_W - 2*PDF_MARGIN;
  roundRect(pm.ctx, PDF_MARGIN, pm.y, w, h, 4*PDF_SCALE);
  pm.ctx.fill();
  pm.ctx.fillStyle = '#241505';
  pm.ctx.font = `700 ${9*PDF_SCALE}px Arial`;
  pm.ctx.textAlign = 'center';
  pm.ctx.fillText(label.toUpperCase(), PDF_PAGE_W/2, pm.y + h/2 + 3*PDF_SCALE);
  pm.ctx.textAlign = 'left';
  pm.y += h + 10*PDF_SCALE;
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function pdfKvTable(pm, rows){
  const labelW = 150*PDF_SCALE;
  const valX = PDF_MARGIN + labelW + 10*PDF_SCALE;
  const valW = PDF_PAGE_W - PDF_MARGIN - valX;
  const labelFont = `700 ${8.5*PDF_SCALE}px Arial`;
  const valFont = `400 ${8.5*PDF_SCALE}px Arial`;
  rows.forEach(([label, value])=>{
    const rowH = Math.max(pdfMeasureWrapHeight(pm, value, valFont, valW), 8.5*PDF_SCALE*1.4) + 6*PDF_SCALE;
    pm.ensureSpace(rowH);
    const rowTop = pm.y;
    pm.ctx.font = labelFont;
    pm.ctx.fillStyle = PDF_COL.soft;
    pm.ctx.fillText(label, PDF_MARGIN, pm.y + 8.5*PDF_SCALE);
    pm.y += 2*PDF_SCALE;
    const savedY = pm.y;
    pm.y = rowTop;
    pdfText(pm, value, valX, {size:8.5, maxWidth:valW});
    pm.y = Math.max(pm.y, savedY + 8.5*PDF_SCALE*1.4);
    pm.ctx.strokeStyle = PDF_COL.line;
    pm.ctx.lineWidth = 1;
    pm.ctx.beginPath();
    pm.ctx.moveTo(PDF_MARGIN, pm.y + 4*PDF_SCALE);
    pm.ctx.lineTo(PDF_PAGE_W - PDF_MARGIN, pm.y + 4*PDF_SCALE);
    pm.ctx.stroke();
    pm.y += 10*PDF_SCALE;
  });
}

function pdfImageGrid(pm, imgMap, urls, cols){
  cols = cols || 4;
  const gap = 8*PDF_SCALE;
  const cellW = (PDF_PAGE_W - 2*PDF_MARGIN - gap*(cols-1)) / cols;
  const cellH = cellW;
  if(!urls || !urls.length){
    pdfText(pm, 'No photos recorded.', PDF_MARGIN, {size:8, color:PDF_COL.soft});
    return;
  }
  for(let r=0; r<Math.ceil(urls.length/cols); r++){
    pm.ensureSpace(cellH + gap);
    const rowY = pm.y;
    for(let c=0;c<cols;c++){
      const idx = r*cols+c;
      if(idx>=urls.length) break;
      const x = PDF_MARGIN + c*(cellW+gap);
      const img = imgMap[urls[idx]];
      pm.ctx.strokeStyle = PDF_COL.line;
      pm.ctx.strokeRect(x, rowY, cellW, cellH);
      if(img){
        try{
          const ratio = Math.max(cellW/img.width, cellH/img.height);
          const dw = img.width*ratio, dh = img.height*ratio;
          pm.ctx.save();
          pm.ctx.beginPath();
          pm.ctx.rect(x, rowY, cellW, cellH);
          pm.ctx.clip();
          pm.ctx.drawImage(img, x + (cellW-dw)/2, rowY + (cellH-dh)/2, dw, dh);
          pm.ctx.restore();
        }catch(e){}
      }
    }
    pm.y = rowY + cellH + gap;
  }
}

async function pdfCollectImageUrls(d, customerCopy){
  const urls = [];
  if(d.orderType==='installation'){
    (d.machines||[]).forEach(m=>{ machineImageCats(m).forEach(([k])=>{ (m.images[k]||[]).forEach(u=>urls.push(u)); }); });
    (d.operators||[]).forEach(o=>{ if(o.photo) urls.push(o.photo); if(o.sig && !customerCopy) urls.push(o.sig); });
  } else {
    (d.before && d.before.photos || []).forEach(u=>urls.push(u));
    (d.after && d.after.photos || []).forEach(u=>urls.push(u));
    (d.parts||[]).forEach(p=>{ if(p.photo) urls.push(p.photo); });
  }
  if(!customerCopy && d.signOff){
    if(d.signOff.engineer && d.signOff.engineer.sig) urls.push(d.signOff.engineer.sig);
    if(d.signOff.customer && d.signOff.customer.sig) urls.push(d.signOff.customer.sig);
  }
  return urls;
}

function preloadImageMap(urls){
  const map = {};
  const unique = [...new Set(urls)];
  return Promise.all(unique.map(u=>new Promise(res=>{
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = ()=>{ map[u]=img; res(); };
    img.onerror = ()=>{ res(); };
    img.src = u;
  }))).then(()=>map);
}

function pdfSigOrPlaceholder(pm, x, w, sigUrl, imgMap, hideSig){
  const h = 32*PDF_SCALE;
  if(hideSig || !sigUrl || !imgMap[sigUrl]){
    pm.ctx.strokeStyle = PDF_COL.line;
    pm.ctx.strokeRect(x, pm.y, w, h);
    pm.ctx.fillStyle = PDF_COL.soft;
    pm.ctx.font = `italic 400 ${7.5*PDF_SCALE}px Arial`;
    pm.ctx.textAlign = 'center';
    pm.ctx.fillText(hideSig ? 'Signature on file' : 'Not signed', x+w/2, pm.y+h/2+3*PDF_SCALE);
    pm.ctx.textAlign = 'left';
  } else {
    const img = imgMap[sigUrl];
    const ratio = Math.min(w/img.width, h/img.height);
    const dw = img.width*ratio, dh = img.height*ratio;
    pm.ctx.drawImage(img, x+(w-dw)/2, pm.y+(h-dh)/2, dw, dh);
    pm.ctx.strokeStyle = PDF_COL.ink;
    pm.ctx.beginPath();
    pm.ctx.moveTo(x, pm.y+h);
    pm.ctx.lineTo(x+w, pm.y+h);
    pm.ctx.stroke();
  }
  return h;
}

function pdfSignOffAndCsat(pm, imgMap, hideSig, d){
  pdfSectionHeader(pm, 'Sign-Off');
  const colW = (PDF_PAGE_W - 2*PDF_MARGIN - 20*PDF_SCALE)/2;
  pm.ensureSpace(32*PDF_SCALE + 30*PDF_SCALE);
  const topY = pm.y;
  const leftX = PDF_MARGIN, rightX = PDF_MARGIN + colW + 20*PDF_SCALE;
  const sig = d.signOff || {engineer:{},customer:{}};
  const hL = pdfSigOrPlaceholder(pm, leftX, colW, sig.engineer.sig, imgMap, hideSig);
  pm.y = topY;
  pdfSigOrPlaceholder(pm, rightX, colW, sig.customer.sig, imgMap, hideSig);
  pm.y = topY + hL + 6*PDF_SCALE;
  pm.ctx.font = `700 ${8.5*PDF_SCALE}px Arial`;
  pm.ctx.fillStyle = PDF_COL.ink;
  pm.ctx.fillText(sig.engineer.name || '—', leftX, pm.y+8*PDF_SCALE);
  pm.ctx.fillText(sig.customer.name || '—', rightX, pm.y+8*PDF_SCALE);
  pm.y += 11*PDF_SCALE;
  pm.ctx.font = `400 ${7.5*PDF_SCALE}px Arial`;
  pm.ctx.fillStyle = PDF_COL.soft;
  pm.ctx.fillText(sig.engineer.designation || 'Engineer', leftX, pm.y+8*PDF_SCALE);
  pm.ctx.fillText(sig.customer.designation || 'Customer', rightX, pm.y+8*PDF_SCALE);
  pm.y += 20*PDF_SCALE;

  pdfSectionHeader(pm, 'Customer Satisfaction');
  const csat = d.csat || {rating:0,comment:''};
  const starsTxt = '★'.repeat(csat.rating||0) + '☆'.repeat(5-(csat.rating||0));
  pm.ensureSpace(16*PDF_SCALE);
  pm.ctx.font = `400 ${16*PDF_SCALE}px Arial`;
  pm.ctx.fillStyle = PDF_COL.amber;
  pm.ctx.textAlign = 'center';
  pm.ctx.fillText(starsTxt, PDF_PAGE_W/2, pm.y+14*PDF_SCALE);
  pm.ctx.textAlign = 'left';
  pm.y += 22*PDF_SCALE;
  pdfText(pm, csat.comment || 'No comment provided', PDF_MARGIN, {size:8, color: csat.comment?PDF_COL.ink:PDF_COL.soft});
}

function pdfDefectTable(pm, defects){
  const cols = [
    {label:'Defect', w:0.28}, {label:'Captured', w:0.13}, {label:'Roll No.', w:0.13},
    {label:'Rotation No.', w:0.13}, {label:'Comments', w:0.33}
  ];
  const totalW = PDF_PAGE_W - 2*PDF_MARGIN;
  let cx = PDF_MARGIN;
  const colX = cols.map(c=>{ const x=cx; cx+=c.w*totalW; return x; });
  pm.ensureSpace(14*PDF_SCALE);
  pm.ctx.fillStyle = PDF_COL.steel; pm.ctx.fillRect(PDF_MARGIN, pm.y, totalW, 14*PDF_SCALE);
  pm.ctx.font = `700 ${7*PDF_SCALE}px Arial`;
  pm.ctx.fillStyle = '#fff';
  cols.forEach((c,i)=>pm.ctx.fillText(c.label, colX[i]+4*PDF_SCALE, pm.y+10*PDF_SCALE));
  pm.y += 14*PDF_SCALE;

  (defects||[]).forEach(d2=>{
    const font = `400 ${7.5*PDF_SCALE}px Arial`;
    const vals = [d2.label, d2.captured==='yes'?'Yes':'No', d2.rollNo||'—', d2.rotationNo||'—', d2.comment||'—'];
    const heights = vals.map((v,i)=>pdfMeasureWrapHeight(pm, v, font, cols[i].w*totalW - 8*PDF_SCALE));
    const rowH = Math.max(...heights, 7.5*PDF_SCALE*1.4) + 6*PDF_SCALE;
    pm.ensureSpace(rowH);
    const rowTop = pm.y;
    vals.forEach((v,i)=>{
      const savedY = pm.y;
      pm.y = rowTop;
      pdfText(pm, v, colX[i]+4*PDF_SCALE, {size:7.5, maxWidth: cols[i].w*totalW-8*PDF_SCALE});
      pm.y = Math.max(pm.y, savedY);
    });
    pm.y = rowTop + rowH;
    pm.ctx.strokeStyle = PDF_COL.line;
    pm.ctx.beginPath(); pm.ctx.moveTo(PDF_MARGIN, pm.y); pm.ctx.lineTo(PDF_PAGE_W-PDF_MARGIN, pm.y); pm.ctx.stroke();
  });
  pm.y += 8*PDF_SCALE;
}

function pdfOperators(pm, imgMap, hideSig, d){
  const named = (d.operators||[]).filter(o=>o.name);
  if(!named.length){ pdfText(pm, 'No operators recorded.', PDF_MARGIN, {size:8, color:PDF_COL.soft}); return; }
  named.forEach(o=>{
    const photoSize = 34*PDF_SCALE;
    const rowH = photoSize + 6*PDF_SCALE;
    pm.ensureSpace(rowH);
    const rowTop = pm.y;
    pm.ctx.strokeStyle = PDF_COL.line;
    pm.ctx.strokeRect(PDF_MARGIN, rowTop, photoSize, photoSize);
    const img = o.photo && imgMap[o.photo];
    if(img){
      const ratio = Math.max(photoSize/img.width, photoSize/img.height);
      const dw=img.width*ratio, dh=img.height*ratio;
      pm.ctx.save(); pm.ctx.beginPath(); pm.ctx.rect(PDF_MARGIN,rowTop,photoSize,photoSize); pm.ctx.clip();
      pm.ctx.drawImage(img, PDF_MARGIN+(photoSize-dw)/2, rowTop+(photoSize-dh)/2, dw, dh);
      pm.ctx.restore();
    }
    const textX = PDF_MARGIN + photoSize + 10*PDF_SCALE;
    const sigW = 90*PDF_SCALE;
    const textW = PDF_PAGE_W - PDF_MARGIN - sigW - 10*PDF_SCALE - textX;
    pm.y = rowTop;
    pm.ctx.font = `700 ${8.5*PDF_SCALE}px Arial`;
    pm.ctx.fillStyle = PDF_COL.ink;
    pm.ctx.fillText(o.name, textX, rowTop + 9*PDF_SCALE);
    pm.y = rowTop + 13*PDF_SCALE;
    pdfText(pm, o.topic || '—', textX, {size:7.5, color:PDF_COL.soft, maxWidth: textW});

    const sigX = PDF_PAGE_W - PDF_MARGIN - sigW;
    pm.y = rowTop;
    pdfSigOrPlaceholder(pm, sigX, sigW, o.sig, imgMap, hideSig);

    pm.y = rowTop + rowH;
    pm.ctx.strokeStyle = PDF_COL.line;
    pm.ctx.beginPath(); pm.ctx.moveTo(PDF_MARGIN, pm.y); pm.ctx.lineTo(PDF_PAGE_W-PDF_MARGIN, pm.y); pm.ctx.stroke();
    pm.y += 8*PDF_SCALE;
  });
}

function pdfMachineSection(pm, m, idx, imgMap){
  pdfSectionHeader(pm, `Machine ${idx+1}${m.kmName ? ': '+m.kmName : ''}`);
  pdfKvTable(pm, [
    ['Type of Machine', m.machineType||'—'],
    ['Knit-I Cabinet Serial No.', m.cabinetSerial||'—'],
    ['Tailscale IP', m.tailscaleIp||'—'],
    ['Cabinet Type', m.cabinetType||'—'],
    ['No. of Cameras', m.numCams||'—'],
    ['Knitting Machine Brand', m.kmBrand||'—'],
    ['Knitting Machine Model', m.kmModel||'—'],
    ['Knitting Machine Serial No.', m.kmSerial||'—'],
    ['Knitting Machine Name', m.kmName||'—'],

  ]);

    const urls = (m.images && m.images[k]) || [];

    pm.ctx.font = `700 ${7.5*PDF_SCALE}px Arial`;

    pm.y += 11*PDF_SCALE;
    pdfImageGrid(pm, imgMap, urls, 4);

  pm.ensureSpace(14*PDF_SCALE);
  pm.y += 4*PDF_SCALE;
  pm.ctx.font = `700 ${8.5*PDF_SCALE}px Arial`;
  pm.ctx.fillStyle = PDF_COL.steel;
  pm.ctx.fillText('DEFECT TESTING', PDF_MARGIN, pm.y+8*PDF_SCALE);
  pm.y += 12*PDF_SCALE;

}

async function generatePdfBytes(d, customerCopy){
  const urls = await pdfCollectImageUrls(d, customerCopy);
  const imgMap = await preloadImageMap(urls);
  const pm = createPageManager();
  const isInstall = d.orderType==='installation';
  const j = d.job || {};

  if(customerCopy) pdfBanner(pm, 'Customer Copy');

  pm.ctx.font = `700 ${15*PDF_SCALE}px Arial`;
  pm.ctx.fillStyle = PDF_COL.ink;
  pm.ctx.fillText(isInstall ? 'Machine Installation Order Report' : 'Field Service Work Order Report', PDF_MARGIN, pm.y+14*PDF_SCALE);
  pm.y += 20*PDF_SCALE;
  const meta = isInstall ? `WO ${j.wo||'—'} · ${j.startDate||'—'} to ${j.endDate||'—'}` : `WO ${j.wo||'—'} · ${j.date||'—'}`;
  pm.ctx.font = `400 ${7.5*PDF_SCALE}px Arial`;
  pm.ctx.fillStyle = PDF_COL.soft;
  pm.ctx.fillText(meta, PDF_MARGIN, pm.y+7*PDF_SCALE);
  pm.y += 18*PDF_SCALE;

  if(isInstall){
    pdfKvTable(pm, [
      ['Customer', j.customer||'—'],
      ['Location', j.location||'—'],
      ['Engineer', j.engineer||'—'],
      ['Machine Count', `${d.machineMode==='multiple'?'Multiple':'Single'} (${(d.machines||[]).length})`]
    ]);
    pdfSectionHeader(pm, 'Site Readiness');
    const sr = d.siteReadiness || {};
    pdfKvTable(pm, [
      ['Power supply available and stable', sr.power?'Yes':'No'],
      ['Network / LAN point available', sr.networkPoint?'Yes':'No'],
      ['Mounting surface / bracket ready', sr.mounting?'Yes':'No'],
      ['Lighting conditions adequate', sr.lighting?'Yes':'No'],
      ['Notes', sr.notes||'—']
    ]);
    (d.machines||[]).forEach((m,i)=>pdfMachineSection(pm, m, i, imgMap));

    pdfSectionHeader(pm, 'Training Provided');
    pdfOperators(pm, imgMap, customerCopy, d);

    pdfSectionHeader(pm, 'Suggestion to Factory');
    pdfText(pm, d.suggestion || '—', PDF_MARGIN, {size:8.5});
    pdfSectionHeader(pm, 'Maintenance Guide to Factory');
    pdfText(pm, d.maintenanceGuide || '—', PDF_MARGIN, {size:8.5});
  } else {
    pdfKvTable(pm, [
      ['Customer', j.customer||'—'],
      ['Location', j.location||'—'],
      ['Machine / Asset', j.machine||'—'],
      ['Engineer', j.engineer||'—']
    ]);
    if(j.machineDetails){
      pdfSectionHeader(pm, 'Machine Details (from installation record)');
      pdfKvTable(pm, [
        ['Brand / Model', `${j.machineDetails.kmBrand||'—'} / ${j.machineDetails.kmModel||'—'}`],
        ['Serial No.', j.machineDetails.kmSerial||'—'],
        ['Cabinet Serial / Type', `${j.machineDetails.cabinetSerial||'—'} / ${j.machineDetails.cabinetType||'—'}`],
        ['Tailscale IP', j.machineDetails.tailscaleIp||'—'],
        ['Gauge / Diameter', `${j.machineDetails.kmGauge||'—'} / ${j.machineDetails.kmDiameter||'—'}`]
      ]);
    }
    pdfSectionHeader(pm, 'Before');
    pdfImageGrid(pm, imgMap, (d.before && d.before.photos) || [], 4);
    pdfText(pm, (d.before && d.before.comments) || '—', PDF_MARGIN, {size:8.5});
    pdfSectionHeader(pm, 'After');
    pdfImageGrid(pm, imgMap, (d.after && d.after.photos) || [], 4);
    pdfText(pm, (d.after && d.after.comments) || '—', PDF_MARGIN, {size:8.5});

    pdfSectionHeader(pm, 'Troubleshooting Log');
    if((d.troubleshoot||[]).length){
      d.troubleshoot.forEach(e=>pdfText(pm, `${e.time} — ${e.text}`, PDF_MARGIN, {size:8}));
    } else {
      pdfText(pm, 'No troubleshooting notes logged.', PDF_MARGIN, {size:8, color:PDF_COL.soft});
    }

    pdfSectionHeader(pm, 'Parts Used');
    const parts = (d.parts||[]).filter(p=>p.name||p.partNo||p.serialNo);
    if(parts.length){
      parts.forEach((p,i)=>{
        pdfKvTable(pm, [
          [`Part ${i+1}`, p.name||'—'],
          ['Part No. / Serial No.', `${p.partNo||'—'} / ${p.serialNo||'—'}`],
          ['Qty', String(p.qty||1)],
          ['Specification', p.spec||'—']
        ]);
        if(p.photo) pdfImageGrid(pm, imgMap, [p.photo], 4);
      });
    } else {
      pdfText(pm, 'No parts recorded.', PDF_MARGIN, {size:8, color:PDF_COL.soft});
    }
  }

  pdfSignOffAndCsat(pm, imgMap, customerCopy, d);

  const jpegPages = pm.pages.map(canvas=>{
    const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
    const base64 = dataUrl.split(',')[1];
    const binStr = atob(base64);
    const bytes = new Uint8Array(binStr.length);
    for(let i=0;i<binStr.length;i++) bytes[i] = binStr.charCodeAt(i);
    return { bytes, width: canvas.width, height: canvas.height };
  });
  return buildMinimalPdf(jpegPages, PDF_PT_W, PDF_PT_H);
}

function buildMinimalPdf(pageImages, pageWidthPt, pageHeightPt){
  const enc = new TextEncoder();
  const parts = [];
  let offset = 0;
  const offsets = {};
  function push(data){
    const bytes = typeof data === 'string' ? enc.encode(data) : data;
    parts.push(bytes);
    offset += bytes.length;
  }
  function startObj(num){ offsets[num] = offset; push(`${num} 0 obj\n`); }
  function endObj(){ push('endobj\n'); }

  push('%PDF-1.4\n');
  const numPages = pageImages.length;
  const catalogNum = 1, pagesNum = 2;
  const kids = [];
  for(let i=0;i<numPages;i++){ kids.push(3+i*3); }

  startObj(catalogNum);
  push(`<< /Type /Catalog /Pages ${pagesNum} 0 R >>\n`);
  endObj();

  startObj(pagesNum);
  push(`<< /Type /Pages /Kids [${kids.map(k=>k+' 0 R').join(' ')}] /Count ${numPages} >>\n`);
  endObj();

  for(let i=0;i<numPages;i++){
    const pageObj = 3+i*3, imgObj = 4+i*3, contentObj = 5+i*3;
    const img = pageImages[i];

    startObj(pageObj);
    push(`<< /Type /Page /Parent ${pagesNum} 0 R /MediaBox [0 0 ${pageWidthPt} ${pageHeightPt}] /Resources << /XObject << /Im0 ${imgObj} 0 R >> >> /Contents ${contentObj} 0 R >>\n`);
    endObj();

    startObj(imgObj);
    push(`<< /Type /XObject /Subtype /Image /Width ${img.width} /Height ${img.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${img.bytes.length} >>\nstream\n`);
    push(img.bytes);
    push('\nendstream\n');
    endObj();

    const contentStr = `q ${pageWidthPt} 0 0 ${pageHeightPt} 0 0 cm /Im0 Do Q`;
    const contentBytes = enc.encode(contentStr);
    startObj(contentObj);
    push(`<< /Length ${contentBytes.length} >>\nstream\n`);
    push(contentBytes);
    push('\nendstream\n');
    endObj();
  }

  const xrefOffset = offset;
  const totalObjs = 2 + numPages*3;
  push(`xref\n0 ${totalObjs+1}\n`);
  push('0000000000 65535 f \n');
  for(let n=1;n<=totalObjs;n++){
    const off = offsets[n] || 0;
    push(String(off).padStart(10,'0')+' 00000 n \n');
  }
  push(`trailer\n<< /Size ${totalObjs+1} /Root ${catalogNum} 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`);

  const total = parts.reduce((s,p)=>s+p.length,0);
  const result = new Uint8Array(total);
  let pos=0;
  for(const p of parts){ result.set(p,pos); pos+=p.length; }
  return result;
}

async function downloadOrderPdf(d, customerCopy){
  try{
    const bytes = await generatePdfBytes(d, !!customerCopy);
    const blob = new Blob([bytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const wo = (d.job && d.job.wo) || 'order';
    a.href = url;
    a.download = `Order_${String(wo).replace(/[^a-z0-9-_]/gi,'_')}.pdf`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 3000);
  }catch(err){
    alert('PDF generation failed: ' + err.message);
  }
}
// ================= end PDF generator =================

if(SUPA_URL && SUPA_KEY && AUTH_TOKEN && ME.id){
  showMainApp();
} else {
  showAuthScreen();
}
</script>

  // ================= Persistent storage: drafts, recent values, WO numbering =================
  // Falls back to localStorage when window.storage isn't available (e.g. this file
  // downloaded and opened directly, rather than run live inside a Claude artifact).
  async function storageGetSafe(key){
    try{
      if(typeof window.storage !== 'undefined' && window.storage){
        const r = await window.storage.get(key, false);
        return r ? r.value : null;
      }
    }catch(e){}
    try{ return localStorage.getItem(key); }catch(e){ return null; }
  }
  async function storageSetSafe(key, value){
    try{
      if(typeof window.storage !== 'undefined' && window.storage){
        await window.storage.set(key, value, false);
        return true;
      }
    }catch(e){}
    try{ localStorage.setItem(key, value); return true; }catch(e){ return false; }
  }
  async function storageDeleteSafe(key){
    try{
      if(typeof window.storage !== 'undefined' && window.storage){
        await window.storage.delete(key, false);
        return;
      }
    }catch(e){}
    try{ localStorage.removeItem(key); }catch(e){}
  }

  function pushRecent(list, value, max){
    max = max || 8;
    value = (value||'').trim();
    if(!value) return list;
    const filtered = list.filter(v=>v.toLowerCase() !== value.toLowerCase());
    filtered.unshift(value);
    return filtered.slice(0, max);
  }

  async function loadRecents(){
    const keys = ['customers','locations','engineers','kmBrands'];
    for(const k of keys){

  async function generateWoNumber(){
    const today = new Date();
    const ymd = today.getFullYear().toString() + String(today.getMonth()+1).padStart(2,'0') + String(today.getDate()).padStart(2,'0');
    const key = 'counter:wo:'+ymd;
    let seq = 1;
    const raw = await storageGetSafe(key);
    if(raw){ seq = (parseInt(raw,10)||0) + 1; }
    await storageSetSafe(key, String(seq));
    return `WO-${ymd}-${String(seq).padStart(3,'0')}`;
  }

  // ---- Offline submission queue: if the server can't be reached, save the
  // completed order locally and retry automatically once connectivity returns,
  // rather than losing the submission or blocking the engineer. ----
  async function getSubmissionQueue(){
    try{ const raw = await storageGetSafe('queue:submissions'); return raw ? JSON.parse(raw) : []; }
    catch(e){ return []; }
  }
  async function setSubmissionQueue(queue){
    await storageSetSafe('queue:submissions', JSON.stringify(queue));
  }
  async function enqueueSubmission(url, key, payload, assignmentId){
    const queue = await getSubmissionQueue();
    queue.push({ url, key, payload, assignmentId, queuedAt: new Date().toISOString() });
    await setSubmissionQueue(queue);
  }
  let flushInFlight = false;
  async function flushSubmissionQueue(){
    if(flushInFlight) return;
    if(!state.authToken) return; // need a live session to retry against
    flushInFlight = true;
    try{
      const queue = await getSubmissionQueue();
      if(!queue.length) return;
      await ensureFreshToken();
      const remaining = [];
      for(const item of queue){
        try{
          // Uses the CURRENT session token, not one saved at queue time — tokens
          // expire, and the live one is far more likely to still be valid.
          await performSubmission(item.payload, item.assignmentId, item.url, item.key, state.authToken);
          toast('Queued order submitted ✓');
        }catch(e){
          remaining.push(item);
        }
      }
      await setSubmissionQueue(remaining);
      if(currentKey && state.orderType && currentKey()==='done') render();
    } finally {
      flushInFlight = false;
    }
  }

      suggestion: state.suggestion, maintenanceGuide: state.maintenanceGuide, after: state.after,
      signOff: state.signOff, csat: state.csat, currentAssignmentId: state.currentAssignmentId
    }));
    snap.savedAt = new Date().toISOString();
    if(stripImages){

      snap.parts.forEach(p=>{ p.photo = null; });
      snap.machines.forEach(m=>{ Object.keys(m.images).forEach(k=>{ m.images[k] = []; }); });
      snap.operators.forEach(o=>{ o.photo = null; o.sig = null; });
      snap.signOff.engineer.sig = null; snap.signOff.customer.sig = null;

    } finally {

  }

  async function fetchMyProfile(){

  async function persistSession(){
    await storageSetSafe('session:authToken', state.authToken);
    await storageSetSafe('session:refreshToken', state.authRefreshToken);
    await storageSetSafe('session:userId', state.userId);
    await storageSetSafe('session:userEmail', state.userEmail);
    await storageSetSafe('session:userRole', state.userRole);
    await storageSetSafe('session:userProfileName', state.userProfileName);
  }

  async function clearSession(){
    state.authToken = ''; state.authRefreshToken = ''; state.userId = '';
    state.userEmail = ''; state.userRole = ''; state.userProfileName = '';
    await storageDeleteSafe('session:authToken');
    await storageDeleteSafe('session:refreshToken');
    await storageDeleteSafe('session:userId');
    await storageDeleteSafe('session:userEmail');
    await storageDeleteSafe('session:userRole');
    await storageDeleteSafe('session:userProfileName');
  }

  // ---- Token refresh: Supabase login sessions expire after ~1 hour. Filling
  // out an installation order with many machines/photos can easily take
  // longer than that, so we proactively refresh instead of letting requests
  // fail partway through a submission. ----
  function decodeJwtPayload(token){
    try{
      const part = token.split('.')[1];
      const json = atob(part.replace(/-/g,'+').replace(/_/g,'/'));
      return JSON.parse(json);
    }catch(e){ return null; }
  }

  function isTokenExpiringSoon(token, bufferSeconds){
    bufferSeconds = bufferSeconds || 120;
    const payload = decodeJwtPayload(token);
    if(!payload || !payload.exp) return true; // can't verify — safest to refresh
    return (payload.exp * 1000) < (Date.now() + bufferSeconds * 1000);
  }

  let refreshInFlight = null;
  async function ensureFreshToken(){
    if(!state.authToken || !state.authRefreshToken || !state.serverUrl || !state.supabaseKey) return false;
    if(!isTokenExpiringSoon(state.authToken)) return true;
    if(refreshInFlight) return refreshInFlight;
    refreshInFlight = (async ()=>{
      try{
        const res = await fetch(`${state.serverUrl}/auth/v1/token?grant_type=refresh_token`, {
          method: 'POST',
          headers: { 'apikey': state.supabaseKey, 'Content-Type': 'application/json' },
          body: JSON.stringify({ refresh_token: state.authRefreshToken })
        });
        const data = await res.json();
        if(!res.ok || !data.access_token){
          // Refresh token itself is dead — the user needs to sign in again.
          await clearSession();
          return false;
        }
        state.authToken = data.access_token;
        state.authRefreshToken = data.refresh_token || state.authRefreshToken;
        await persistSession();
        return true;
      }catch(e){
        return false; // network issue — let the caller's own retry/queue logic handle it
      } finally {
        refreshInFlight = null;
      }
    })();
    return refreshInFlight;
  }

  function bindAuthGate(){
    const needsConnection = !state.serverUrl || !state.supabaseKey;
    if(needsConnection){
      document.getElementById('authConnectBtn').onclick = ()=>{
        state.serverUrl = val('a_server_url').trim().replace(/\/+$/,'');
        state.supabaseKey = val('a_supabase_key').trim();
        if(!state.serverUrl || !state.supabaseKey){ toast('Both fields are required'); return; }
        storageSetSafe('settings:serverUrl', state.serverUrl);
        storageSetSafe('settings:supabaseKey', state.supabaseKey);
        render();
      };
      return;
    }

    document.getElementById('authToggleBtn').onclick = ()=>{
      state.authView = state.authView==='signup' ? 'login' : 'signup';
      state.authError = '';
      render();
    };
    document.getElementById('authReconnectBtn').onclick = ()=>{
      state.serverUrl = ''; state.supabaseKey = '';
      storageDeleteSafe('settings:serverUrl'); storageDeleteSafe('settings:supabaseKey');
      render();
    };
    document.getElementById('authSubmitBtn').onclick = async ()=>{
      const email = val('a_email').trim();
      const password = val('a_password');
      const isSignup = state.authView === 'signup';
      if(!email || !password){ state.authError = 'Email and password are required'; render(); return; }
      state.authBusy = true; state.authError = ''; render();
      try{
        const endpoint = isSignup ? '/auth/v1/signup' : '/auth/v1/token?grant_type=password';
        const body = isSignup
          ? { email, password, data: { name: val('a_name').trim() || email } }
          : { email, password };
        const res = await fetch(`${state.serverUrl}${endpoint}`, {
          method: 'POST',
          headers: { 'apikey': state.supabaseKey, 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if(!res.ok) throw new Error(data.error_description || data.msg || data.error || ('Request failed (status ' + res.status + ')'));
        if(!data.access_token){
          throw new Error(isSignup ? 'Account created — check if email confirmation is required, then sign in.' : 'Sign in did not return a session.');
        }
        state.authToken = data.access_token;
        state.authRefreshToken = data.refresh_token || '';
        state.userId = data.user && data.user.id ? data.user.id : '';
        state.userEmail = data.user && data.user.email ? data.user.email : email;
        const profile = await fetchMyProfile();
        state.userProfileName = profile.name || state.userEmail;
        state.userRole = profile.role || 'engineer';
        await persistSession();
        toast(`Welcome, ${state.userProfileName}`);
      }catch(err){
        state.authError = err && err.message ? err.message : 'Something went wrong';
      }
      state.authBusy = false;
      render();
    };
  }
